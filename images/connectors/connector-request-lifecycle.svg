<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Sequence of an MCP tool call: the agent calls tools/call on the MCP endpoint, which validates the agent, resolves credentials via buildAppAuth, dispatches the request through the registry to the external API, then returns a bounded result to the agent.">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- self-contained light panel: readable on light and dark pages -->
  <rect x="0" y="0" width="1440" height="600" rx="16" fill="#f8fafc"/>

  <!-- lifelines -->
  <g stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="5 5">
    <line x1="130" y1="86" x2="130" y2="516"/>
    <line x1="370" y1="86" x2="370" y2="516"/>
    <line x1="610" y1="86" x2="610" y2="516"/>
    <line x1="850" y1="86" x2="850" y2="516"/>
    <line x1="1090" y1="86" x2="1090" y2="516"/>
    <line x1="1330" y1="86" x2="1330" y2="516"/>
  </g>

  <!-- participant headers (top + bottom) -->
  <g font-size="17" font-weight="600" fill="#1e293b" text-anchor="middle">
    <g>
      <rect x="42" y="46" width="176" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="130" y="71">Agent Factory agent</text>
      <rect x="42" y="516" width="176" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="130" y="541">Agent Factory agent</text>
    </g>
    <g>
      <rect x="300" y="46" width="140" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="370" y="71">MCP endpoint</text>
      <rect x="300" y="516" width="140" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="370" y="541">MCP endpoint</text>
    </g>
    <g>
      <rect x="540" y="46" width="140" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="610" y="71">validateAgent</text>
      <rect x="540" y="516" width="140" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="610" y="541">validateAgent</text>
    </g>
    <g>
      <rect x="780" y="46" width="140" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="850" y="71">buildAppAuth</text>
      <rect x="780" y="516" width="140" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="850" y="541">buildAppAuth</text>
    </g>
    <g>
      <rect x="985" y="46" width="210" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="1090" y="71">Registry + executeApiCall</text>
      <rect x="985" y="516" width="210" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="1090" y="541">Registry + executeApiCall</text>
    </g>
    <g>
      <rect x="1260" y="46" width="140" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="1330" y="71">External API</text>
      <rect x="1260" y="516" width="140" height="40" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.4"/>
      <text x="1330" y="541">External API</text>
    </g>
  </g>

  <!-- messages -->
  <g fill="#334155" text-anchor="middle">
    <!-- m1: agent -> mcp (solid) -->
    <text x="250" y="114" font-size="14">tools/call { name, arguments, agent_id }</text>
    <line x1="130" y1="122" x2="368" y2="122" stroke="#475569" stroke-width="1.7" marker-end="url(#arw)"/>

    <!-- m2: mcp -> validateAgent (solid) -->
    <text x="490" y="164" font-size="15">agent_id in allowlist?</text>
    <line x1="370" y1="172" x2="608" y2="172" stroke="#475569" stroke-width="1.7" marker-end="url(#arw)"/>

    <!-- m3: validateAgent --> mcp (dashed return) -->
    <text x="490" y="199" font-size="15">allowed</text>
    <line x1="610" y1="207" x2="372" y2="207" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arw)"/>

    <!-- m4: mcp -> buildAppAuth (solid) -->
    <text x="610" y="249" font-size="15">resolve credentials (tenant config)</text>
    <line x1="370" y1="257" x2="848" y2="257" stroke="#475569" stroke-width="1.7" marker-end="url(#arw)"/>

    <!-- m5: buildAppAuth --> mcp (dashed) -->
    <text x="610" y="292" font-size="15">{ accessToken, baseUrl }</text>
    <line x1="850" y1="300" x2="372" y2="300" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arw)"/>

    <!-- m6: mcp -> registry (solid) -->
    <text x="730" y="342" font-size="15">entity + action → REST request</text>
    <line x1="370" y1="350" x2="1088" y2="350" stroke="#475569" stroke-width="1.7" marker-end="url(#arw)"/>

    <!-- m7: registry -> external api (solid) -->
    <text x="1210" y="390" font-size="15">authenticated HTTP call</text>
    <line x1="1090" y1="398" x2="1328" y2="398" stroke="#475569" stroke-width="1.7" marker-end="url(#arw)"/>

    <!-- m8: external api --> registry (dashed) -->
    <text x="1210" y="433" font-size="15">response</text>
    <line x1="1330" y1="441" x2="1092" y2="441" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arw)"/>

    <!-- m9: registry --> mcp (dashed) -->
    <text x="730" y="475" font-size="15">formatted tool result</text>
    <line x1="1090" y1="483" x2="372" y2="483" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arw)"/>

    <!-- m10: mcp --> agent (dashed) -->
    <text x="250" y="504" font-size="14">result (bounded for the context window)</text>
    <line x1="370" y1="510" x2="132" y2="510" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arw)"/>
  </g>
</svg>
