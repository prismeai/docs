<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 560" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="A connector app instance runs inside a tenant workspace. An Agent Factory agent calls the MCP endpoint and a DSUL automation calls App-mode instructions. Both converge on buildAppAuth, then registry dispatch, then the external API.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- self-contained light panel so the diagram stays readable on light and dark pages -->
  <rect x="0" y="0" width="1440" height="560" rx="16" fill="#f8fafc"/>

  <!-- Tenant workspace -->
  <rect x="36" y="52" width="1004" height="456" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="60" y="82" font-size="20" font-weight="600" fill="#334155">Tenant workspace</text>

  <!-- Callers -->
  <rect x="70" y="150" width="196" height="66" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="168" y="189" font-size="19" font-weight="500" fill="#1e293b" text-anchor="middle">Agent Factory agent</text>

  <rect x="70" y="330" width="196" height="66" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="168" y="369" font-size="19" font-weight="500" fill="#1e293b" text-anchor="middle">DSUL automation</text>

  <!-- Connector app instance -->
  <rect x="322" y="104" width="690" height="368" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="667" y="132" font-size="19" font-weight="600" fill="#334155" text-anchor="middle">Connector app instance — tenant context</text>

  <!-- MCP endpoint -->
  <rect x="360" y="164" width="224" height="76" rx="10" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="472" y="196" font-size="19" font-weight="600" fill="#1e293b" text-anchor="middle">MCP endpoint</text>
  <text x="472" y="221" font-size="16" fill="#475569" text-anchor="middle">JSON-RPC 2.0</text>

  <!-- App-mode instructions -->
  <rect x="360" y="336" width="224" height="76" rx="10" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="472" y="368" font-size="19" font-weight="600" fill="#1e293b" text-anchor="middle">App-mode instructions</text>
  <text x="472" y="393" font-size="16" fill="#475569" text-anchor="middle">Connector.operation()</text>

  <!-- buildAppAuth -->
  <rect x="648" y="250" width="176" height="76" rx="10" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="736" y="282" font-size="19" font-weight="600" fill="#1e293b" text-anchor="middle">buildAppAuth</text>
  <text x="736" y="307" font-size="16" fill="#475569" text-anchor="middle">multi-mode auth</text>

  <!-- Registry dispatch -->
  <rect x="856" y="250" width="140" height="76" rx="10" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="926" y="278" font-size="18" font-weight="600" fill="#1e293b" text-anchor="middle">Registry</text>
  <text x="926" y="301" font-size="15" fill="#475569" text-anchor="middle">entity + action</text>

  <!-- External API -->
  <rect x="1118" y="238" width="220" height="100" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1228" y="278" font-size="19" font-weight="600" fill="#1e293b" text-anchor="middle">External API</text>
  <text x="1228" y="304" font-size="15" fill="#475569" text-anchor="middle">Jira · Microsoft Graph</text>
  <text x="1228" y="324" font-size="15" fill="#475569" text-anchor="middle">Salesforce · …</text>

  <!-- Arrows -->
  <!-- agent -> mcp -->
  <path d="M266 183 L354 195" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="310" y="168" font-size="15" fill="#475569" text-anchor="middle">MCP tools/call</text>
  <!-- dsul -> app -->
  <path d="M266 363 L354 373" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="312" y="352" font-size="15" fill="#475569" text-anchor="middle">Connector.operation()</text>
  <!-- mcp -> buildAppAuth -->
  <path d="M584 210 C620 224 620 256 642 272" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- app -> buildAppAuth -->
  <path d="M584 366 C620 352 620 320 642 304" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- buildAppAuth -> registry -->
  <path d="M824 288 L850 288" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <!-- registry -> external api -->
  <path d="M996 288 L1112 288" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
</svg>
