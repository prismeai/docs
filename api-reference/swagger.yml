  ############################################# prisme.ai-events
  /v2/workspaces/{workspaceId}/events:
    get:
      summary: Events Longpolling
      description: Retrieve events filtered with any JSON path specified in GET
        parameters. Can be called as websocket.
      operationId: eventsLongpolling
      tags:
        - 'Prisme.ai Events'
      parameters:
        - name: 'workspaceId'
          in: 'path'
          description: 'ID of workspace to listen to'
          required: true
          schema:
            type: string
        - name: 'text'
          in: 'query'
          description: 'Search these keywords'
          schema:
            type: string
          allowReserved: true
        - name: beforeId
          in: query
          description: Match every events created before given eventId
          schema:
            type: string
        - name: appInstanceDepth
          in: query
          description: Match only events from appInstances not exceeding that depth
          schema:
            type: number
        - in: query
          name: query
          schema:
            type: object
            additionalProperties: true
          style: form
          explode: false
          allowReserved: true
        - name: 'types'
          in: 'query'
          example: message,notification
          description: 'Comma separated list of listened event types '
          schema:
            type: string
          allowReserved: true
        - name: 'afterDate'
          in: 'query'
          description: 'Retrieve events created after this ISO8601 formatted date'
          schema:
            type: string
        - name: 'beforeDate'
          in: 'query'
          description: 'Retrieve events created before this ISO8601 formatted date'
          schema:
            type: string
        - name: 'page'
          in: 'query'
          description: 'Page number'
          schema:
            type: number
        - name: 'limit'
          in: 'query'
          description: 'Page size'
          required: false
          schema:
            type: number
        - name: sort
          in: 'query'
          description: "Sort order, asc for oldest first & 'desc' for earliest first.
            Earliest first by default"
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      events:
                        $ref: '#/components/schemas/AllEventResponses'

        '404':
          description: Object not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectNotFoundError'
        '400':
          description: Bad parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadParametersError'
        '401':
          description: AuthenticationError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationError'
        '403':
          description: Bad permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'

    post:
      summary: Send Workspace Event
      description: Emit a new event in this workspace
      operationId: sendWorkspaceEvent
      tags:
        - 'Prisme.ai Events'
      parameters:
        - name: 'workspaceId'
          in: 'path'
          description: 'ID of workspace to listen to'
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - events
