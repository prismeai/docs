        '403':
          description: Bad permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '400':
          description: Bad parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadParametersError'

  /v2/workspaces/{workspaceId}/files:
    post:
      summary: Upload File
      description: Upload one or more file(s)
      operationId: uploadFile
      tags:
        - 'Prisme.ai Workspaces'
      parameters:
        - name: 'workspaceId'
          in: 'path'
          description: 'Workspace id'
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              additionalProperties: true
              properties:
                file:
                  type: string
                  format: binary
                  description: Accepts both binary data or dataURI (i.e data:...,base64:...)
                expiresAfter:
                  type: string
                  description: File expiration time in seconds. This is currently a best effort
                    expiration as it will be deleted only upon the next restart
                    after expiration
                public:
                  type: string
                  description: 'Set to true to make uploaded file publicly available'
                shareToken:
                  type: string
                  description: 'If enabled, return a share token that will allow anybody access
                    the file'
                id:
                  type: string
                  description: 'Optional custom file ID(s). Can be a single string (applied to
                    first file) or an array (one per uploaded file). Files
                    without a custom ID get a random one.'

      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/File'
        '401':
          description: AuthenticationError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationError'
        '403':
          description: Bad permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '400':
          description: Bad parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadParametersError'

    get:
      summary: List Files
      description: List workspace files
      operationId: listFiles
      tags:
        - 'Prisme.ai Workspaces'
      parameters:
        - name: 'workspaceId'
          in: 'path'
          description: 'Workspace id'
          required: true
          schema:
            type: string
        - name: 'page'
          in: 'query'
          description: 'Page number'
          schema:
            type: number
        - name: 'limit'
          in: 'query'
          description: 'Page size'
          required: false
          schema:
            type: number
        - in: query
          name: query
          schema:
            type: object
            additionalProperties: true
          style: form
          explode: false
        - name: 'sort'
          in: 'query'
          description: 'Sort by a specific field'
          required: false
          example: '-createdAt'
          schema:
            type: string
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/File'
        '404':
          description: Object not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectNotFoundError'
        '401':
          description: AuthenticationError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationError'
        '403':
          description: Bad permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'

