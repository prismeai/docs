          type: string
          example: workspaces.pages.permissions.deleted
          enum:
            - workspaces.pages.permissions.deleted
        payload:
          type: object
          required:
            - subjectId
            - target
          properties:
            subjectId:
              type: string
            target:
              $ref: '#/components/schemas/UserPermissionsTarget'

    ########################## Runtime events ##########################

    UpdatedRuntimeDSUL:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: runtime.dsul.updated
          enum:
            - runtime.dsul.updated
        payload:
          type: object
          required:
            - workspaceId
          properties:
            workspaceId:
              type: string
            duration:
              type: number
            reason:
              type: object

    TriggerType:
      type: string
      enum:
        - 'event'
        - 'endpoint'
        - 'schedule'
        - 'automation'

    TriggeredInteraction:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: runtime.interactions.triggered
          enum:
            - runtime.interactions.triggered
        payload:
          type: object
          required:
            - workspaceId
            - automation
            - trigger
            - startedAt
          properties:
            workspaceId:
              type: string
            sourceWorkspaceId:
              type: string
            authenticatedWorkspaceId:
              type: string
            automation:
              type: string
            trigger:
              type: object
              required:
                - type
                - value
              properties:
                type:
                  $ref: '#/components/schemas/TriggerType'
                value:
                  type: string
                id:
                  type: string
                appInstanceSlug:
                  type: string
            startedAt:
              type: string

    ScheduleTriggered:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: runtime.schedules.triggered
          enum:
            - runtime.schedules.triggered
        payload:
          type: object
          required:
            - workspaceId
            - automation
            - trigger
            - startedAt
          properties:
            workspaceId:
              type: string
            sourceWorkspaceId:
              type: string
            authenticatedWorkspaceId:
              type: string
            automation:
              type: string
            trigger:
              type: object
              required:
                - type
                - value
              properties:
                type:
                  type: string
                  enum:
                    - schedule
                value:
                  type: string
                id:
                  type: string
                appInstanceSlug:
                  type: string
            startedAt:
              type: string

    ExecutedAutomation:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: runtime.automations.executed
          enum:
            - runtime.automations.executed
        payload:
          type: object
          required:
            - slug
            - trigger
            - payload
            - output
            - duration
            - startedAt
            - break
          properties:
            slug:
              type: string
            trigger:
              type: object
              properties:
                type:
                  type: string
                value:
                  type: string
            payload:
              type: object
            output:
              $ref: '#/components/schemas/AnyValue'
            duration:
              type: number
            throttled:
              type: number
            startedAt:
              type: string
            break:
              type: boolean

    ScheduledAutomation:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: runtime.schedules.created
          enum:
            - runtime.schedules.created
        payload:
          type: object
          required:
            - slug
            - schedules
          properties:
            slug:
              type: string
            schedules:
              $ref: '#/components/schemas/Schedules'
            details:
              type: object
              additionalProperties: true

    SuspendedWorkspace:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: workspaces.suspended
          enum:
            - workspaces.suspended
        payload:
          type: object
          required:
            - workspaceId
            - suspended
            - reason
          properties:
            workspaceId:
              type: string
            suspended:
              type: boolean
            reason:
              type: string

    UpdatedCollectionSchemas:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: workspaces.collections.updated
          enum:
            - workspaces.collections.updated
        payload:
          type: object
          required:
            - namespace
            - workspaceId
            - collection
            - schema
            - properties
          properties:
            namespace:
              type: string
            workspaceId:
              type: string
            appSlug:
              type: string
            schema:
              type: string
            collection:
              type: string
            oldCollection:
              type: string
            properties: {}
            indexes:
              type: array
              items: {}
            uniques:
              type: array
              items: {}

    ContextSetType:
      type: string
      enum:
        - replace
        - merge
        - push
        - delete

    UpdatedContexts:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: runtime.contexts.updated
          enum:
            - runtime.contexts.updated
        payload:
          type: object
          required:
            - emitterId
            - updates
          properties:
            emitterId:
              type: string
              description: 'Internal id to avoid applying these updates to the worker which
                emitted them'
            updates:
              type: array
              items:
                type: object
                required:
                  - type
                  - path
                  - fullPath
                  - context
                properties:
                  type:
                    $ref: '#/components/schemas/ContextSetType'
                  path:
                    type: array
                    items:
                      oneOf:
                        - type: string
                        - type: number
                  fullPath:
                    type: string
                  context:
                    type: string
                  value: {}
                  cacheId:
                    type: string

    PendingWait:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: runtime.waits.pending
          enum:
            - runtime.waits.pending
        payload:
          type: object
          required:
            - id
            - expiresAt
            - wait
          properties:
            id:
              type: string
            expiresAt:
              type: number
            wait:
              $ref: '#/components/schemas/Wait/properties/wait'

    FulfilledWait:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: runtime.waits.fulfilled
          enum:
            - runtime.waits.fulfilled
        payload:
          type: object
          required:
            - id
            - event
          properties:
            id:
              type: string
            event:
              $ref: '#/components/schemas/PrismeEvent'

    FailedFetch:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: runtime.fetch.failed
          enum:
            - runtime.fetch.failed
        payload:
          type: object
          required:
            - request
          properties:
            request: *fetchBody
            response:
              type: object
              required:
                - status
                - body
                - headers
              properties:
                status:
                  type: number
                body: {}
                headers:
                  type: object
            error:
              type: object
              description: 'Network error details'
              properties:
                error:
                  type: string
                message:
                  type: string
                details:
                  type: object
                status:
                  type: number

    ########################## Topics events ##########################
    UserTopic:
      type: object
      required:
        - topic
      properties:
        topic:
          type: string
          example: 'conversation:56'
        userIds:
          type: array
          items:
            type: string
          description: Subscribing user ids

    CreatedUserTopic:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: events.userTopics.created
          enum:
            - events.userTopics.created
        payload:
          $ref: '#/components/schemas/UserTopic'

    JoinedUserTopic:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: events.userTopics.joined
          enum:
            - events.userTopics.joined
        payload:
          type: object
          required:
            - topic
            - user
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
            topic:
              type: string

    AppEvent:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: someCustomEvent
        payload:
          $ref: '#/components/schemas/AnyValue'

    ServiceReadinessResponse:
      type: object
      properties:
        status:
          type: string
        errors:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/GenericError"
              - type: object
                properties:
                  module:
                    type: string
                  driver:
                    type: string
        modulesReady:
          type: array
          items:
            type: object
            properties:
              module:
                type: string
              driver:
                type: string

    ServiceReadiness:
      type: object
      properties:
        status:
          type: string
        url:
          type: string
        response:
          $ref: "#/components/schemas/ServiceReadinessResponse"

    GenericError:
      type: object
      properties:
        error:
          type: string
          example: ObjectNotFound
        message:
          type: string
        details:
          $ref: '#/components/schemas/AnyValue'

    ObjectNotFoundError:
      type: object
      properties:
        error:
          type: string
          example: ObjectNotFound
        message:
          type: string

    BadParametersError:
      type: object
      properties:
        error:
          type: string
          example: BadParameters
        message:
          type: string
        details: {}

    AuthenticationError:
      type: object
      properties:
        error:
          type: string
          example: AuthenticationError
        message:
          type: string
          example: Unauthenticated

    ForbiddenError:
      type: object
      properties:
        error:
          type: string
          example: ForbiddenError
        message:
          type: string
          example: Forbidden

    Organization:
      type: object
      required:
        - name
        - slug
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        photo:
          type: string
        status:
          type: string
          enum:
            - active
            - suspended
        domains:
          type: array
          items:
            type: string
        branding:
          type: object
          additionalProperties: true
          properties:
            version:
              type: string
            platformName:
              type: string
            description:
              type: string
            logo:
              type: object
              properties:
                light:
                  type: string
                dark:
                  type: string
            favicon:
              type: string
            colors:
              type: object
              properties:
                primary:
                  type: string
                secondary:
                  type: string
                accent:
                  type: string
            fonts:
              type: object
              properties:
                heading:
                  type: string
                body:
                  type: string
            customCssUrl:
              type: string
            customCssInline:
              type: string
        navigation:
          $ref: '#/components/schemas/Navigation'
        joinRules:
          type: array
          description: >-
            Auto-join rules. Each item is an OR case with AND-chained conditions
            in rules[]. Example: [{ rules: [{ field: "email", operator:
            "endsWith", value: "@acme.com" }], role: "member", groups:
            ["engineering"] }]
          items:
            type: object
            required:
              - rules
            properties:
              rules:
                type: array
                description: Conditions that must ALL match (AND logic)
                items:
                  type: object
                  required:
                    - field
                    - operator
                    - value
                  properties:
                    field:
                      type: string
                      description: >-
                        User attribute to match, supports dot notation for
                        nested fields (e.g. "email", "authData.google.hd")
                    operator:
                      type: string
                      enum:
                        - equals
                        - startsWith
                        - endsWith
                      description: Match operator
                    value:
                      type: string
                      description: Value to match against (case-insensitive)
              role:
                type: string
                description: Role slug to assign (defaults to org's defaultRole)
              groups:
                type: array
                description: Group slugs to add the user to
                items:
                  type: string
        defaultRole:
          type: string
        settings:
          type: object
          additionalProperties: true
        subscriptionSlug:
          type: string
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    NavigationFeature:
      type: object
      description: Feature attached to a navigation item (agent or template)
      required:
        - type
        - slug
        - label
      properties:
        type:
          type: string
          enum:
            - agent
            - template
        slug:
          type: string
          description: Unique identifier for this feature within the menu item
        label:
          type: string
          description: Display label for the feature
        agentId:
          type: string
          description: Agent ID (required when type=agent)
        templateId:
          type: string
          description: Template ID (required when type=template)
        permissions:
          type: array
          description: Permissions required to see this feature
          items:
            type: string

    NavigationItem:
      type: object
      description: Menu item in the navigation structure
      required:
        - id
        - type
      properties:
        id:
          type: string
          description: Unique identifier for this menu item
        type:
          type: string
          enum:
            - category
            - item
            - divider
        label:
          type: string
          description: Display label (not required for dividers)
        icon:
          type: string
          description: Icon name (from lucide-react)
        color:
          type: string
          description: Icon color (CSS color value)
        href:
          type: string
          description: Link destination (for type=item)
        target:
          type: string
          enum:
            - _self
            - _blank
          description: Link target
        expanded:
          type: boolean
          description: Whether category is expanded by default
        badge:
          type: string
          description: Badge text to show (e.g., "New", "Beta")
        permissions:
          type: array
          description: Permissions required to see this item
          items:
            type: string
        features:
          type: array
          description: Features attached to this item
          items:
            $ref: '#/components/schemas/NavigationFeature'
        visibility:
          type: object
          description: Visibility rules for subscription tiers/features
          properties:
            tiers:
              type: array
              items:
                type: string
            features:
              type: array
              items:
                type: string
        items:
          type: array
          description: Child items (for type=category)
          items:
            $ref: '#/components/schemas/NavigationItem'

    Navigation:
      type: object
      description: Organization navigation configuration
      properties:
        version:
          type: integer
          description: Schema version number
        homePage:
          type: string
          description: >-
            Route to use as home page (e.g., "/apps/agent-factory"). Must be a
            valid relative path starting with /. If not set, defaults to the
            platform default (SecureChat).
          pattern: '^\/[a-zA-Z0-9\-_\/]*$'
        menu:
          type: array
          description: Main menu items
          items:
            $ref: '#/components/schemas/NavigationItem'
        footer:
          type: array
          description: Footer menu items
          items:
            $ref: '#/components/schemas/NavigationItem'
        quickActions:
          type: array
          description: Quick action buttons
          items:
            $ref: '#/components/schemas/NavigationItem'

    OrgMembership:
      type: object
      required:
        - orgSlug
        - userId
        - status
      properties:
        id:
          type: string
        orgSlug:
          type: string
        userId:
          type: string
        roleSlug:
          type: string
        status:
          type: string
          enum:
            - active
            - invited
            - suspended
        invitedBy:
          type: string
        invitedAt:
          type: string
        inviteEmail:
          type: string
        inviteToken:
          type: string
        joinedAt:
          type: string
        joinedVia:
          type: string
          enum:
            - direct
            - invite-code
            - invite-email
            - auto-join
            - join-rule
        groups:
          type: array
          description: >-
            Org group slugs the user belongs to. Only populated on
            listOrgMembers when includeGroups=true.
          items:
            type: string
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    OrgRole:
      type: object
      required:
        - name
        - slug
      properties:
        id:
          type: string
        orgSlug:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        permissions: &ORG_PERMISSIONS
          type: array
          description: >-
            Array of permission strings. Convention:
            {product}:{resource}:{action}

            Wildcards: Use * at end only (e.g., orgs:* matches
            orgs:members:manage)

            Platform permissions: - orgs:* (full org access) -
            orgs:members:manage, orgs:roles:manage, orgs:manage -
            orgs:branding:manage, orgs:navigation:manage -
            orgs:subscriptions:view, orgs:subscriptions:manage -
            orgs:apikeys:manage, orgs:invites:manage, orgs:join-rules:manage -
            secure-chat:*, store:*, knowledge:*, builder:* - agent-builder:*,
            analytics:view, platform-admin:*

            Custom app permissions: {app-slug}:{resource}:{action} Example:
            my-crm:contacts:read, my-crm:deals:manage

            Super admin: ["*"] (matches everything)
          items:
            type: string
        scopes:
          type: array
          description: >-
            Resource scopes granted by this role. Wildcards: ["*"] grants access
            to all resources.
          items:
            type: string
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        isSystem:
          type: boolean

    OrgApiKey:
      type: object
      properties:
        id:
          type: string
          description: Internal role ID
        slug:
          type: string
          description: Unique slug identifying the API key within the org
        name:
          type: string
        permissions: *ORG_PERMISSIONS
        scopes:
          type: array
          description: >-
            Optional string array of resource patterns restricting where
            permissions apply. Format: resourceType:resourceId. Examples:
            agents:agent-abc-123, models:gpt-4o, orgs:acme, agents:*, models:*,
            *
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
        disabled:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    OrgApiKeyWithSecret:
      type: object
      description: Returned on create/rotate — raw key shown only once
      properties:
        id:
          type: string
          description: Internal role ID
        slug:
          type: string
          description: Unique slug identifying the API key within the org
        apiKey:
          type: string
          description: The raw API key (iak_{orgSlug}_{uuid}). Shown only once.
        name:
          type: string
        permissions: *ORG_PERMISSIONS
        expiresAt:
          type: string
          format: date-time

    OrgServiceAccount:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
          description: Synthetic user ID used in JWT sub (sa:{orgSlug}:{slug})
        orgSlug:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        roleSlug:
          type: string
          description: Organization role assigned to this service account
        scopes:
          type: array
          items:
            type: string
          description: Optional scope restrictions (empty means all permissions from
            roleSlug)
        disabled:
          type: boolean
        lastUsedAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    OrgServiceAccountToken:
      type: object
      description: JWT token issued for a service account
      properties:
        accessToken:
          type: string
          description: JWT access token
        expiresAt:
          type: string
          format: date-time
          description: Token expiration timestamp
        tokenType:
          type: string
          example: Bearer
        permissions:
          type: array
          items:
            type: string
          description: Effective permissions from the assigned role
        scopes:
          type: array
          items:
            type: string
          description: Scope restrictions applied to this service account

    OrgGroup:
      type: object
      required:
        - name
        - slug
      properties:
        id:
          type: string
        orgSlug:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        memberCount:
          type: number
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    OrgGroupMember:
      type: object
      required:
        - orgSlug
        - groupSlug
        - userId
      properties:
        id:
          type: string
        orgSlug:
          type: string
        groupSlug:
          type: string
        userId:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string

    OrgInvite:
      type: object
      required:
        - orgSlug
        - status
      properties:
        id:
          type: string
        code:
          type: string
        orgSlug:
          type: string
        roleSlug:
          type: string
        status:
          type: string
          enum:
            - active
            - revoked
        usedCount:
          type: number
        createdBy:
          type: string
        revokedAt:
          type: string
        revokedBy:
          type: string
        createdAt:
          type: string
  ## End of schemas
tags:
  - name: API Gateway
    description: Authentication, session management, SSO providers, and user profile
      endpoints.
  - name: Prisme.ai Workspaces
    description: CRUD operations for workspaces and their resources (pages, apps,
      automations, imports, variables).
  - name: Prisme.ai Runtime
    description: Execute workspace automations and manage their runtime lifecycle.
  - name: Prisme.ai Events
    description: Event ingestion, delivery, and subscription filtering across the platform.
  - name: Organizations
    description: Manage organizations, members, roles, invites, groups, and
      org-level service accounts.
  - name: Subscriptions
    description: Manage organization subscription plans and tier assignments
      (SuperAdmin only).
  - name: Secrets
    description: Read and patch encrypted key-value secrets scoped to a workspace.
  - name: ApiKeys
    description: Create, list, rotate, and validate workspace-scoped API keys.
  - name: Permissions
    description: Share or unshare resources (workspaces, pages, …) with users via
      roles or fine-grained rules.
  - name: Monitoring
    description: Platform readiness checks across services (SuperAdmin only).

paths:
  ############################################# gateway

  /v2/login/providers:
    get:
      summary: Get Login Providers
      description: Login capabilities discovery. Returns available login methods and
        SSO providers.
      operationId: getLoginProviders
      tags:
        - API Gateway
      security: []
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - localSignin
                  - localSignup
                  - providers
                properties:
                  localSignin:
                    type: boolean
                    description: Whether local email/password signin is enabled
                  localSignup:
                    type: boolean
                    description: Whether local email/password signup is enabled
                  providers:
                    type: array
                    description: Globally available SSO providers
                    items:
                      type: object
                      required:
                        - slug
                        - type
                      properties:
                        slug:
                          type: string
                        type:
                          type: string
                        name:
                          type: string
                        icon:
                          type: string
                        meta:
                          type: object

  /v2/login/anonymous:
    post:
      summary: Anonymous Auth
      description: Anonymous authentication
      operationId: anonymousAuth
      tags:
        - API Gateway
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                expiresAfter:
                  type: number
                  description: 'Optional session expiration in seconds'

      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    required:
                      - sessionId
                    properties:
                      sessionId:
                        type: string
                      expires:
                        type: string
        '401': &AuthenticationError
          description: AuthenticationError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationError'

  /v2/login/mfa:
