openapi: '3.0.0'
info:
  version: 1.0.0
  title: Prisme.ai APIs
  description: Prisme.ai APIs specifications
  termsOfService: https://www.prisme.ai/mentions-legales
  contact:
    name: Prisme.ai Support Team
    email: support@prisme.ai
    url: https://www.prisme.ai
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://api.studio.prisme.ai
    description: Prisme.ai Cloud
  - url: https://{customDomain}
    description: Self-hosted Prisme.ai instance
    variables:
      customDomain:
        default: api.your-prisme-instance.com
        description: API hostname of your self-hosted Prisme.ai deployment
  - url: http://localhost:3001
    description: Local development
security:
  - BearerAuth: []
  - WorkspaceApiKeyAuth: []
  - BearerAuth: []
    WorkspaceApiKeyAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT # optional, arbitrary value for documentation purposes
    WorkspaceApiKeyAuth:
      type: apiKey
      in: header
      name: x-prismeai-api-key
    OpenID:
      type: openIdConnect
      openIdConnectUrl: /oidc/.well-known/openid-configuration

  schemas:
    PatternName:
      type: string
      pattern: &PATTERN_NAME "^[0-9A-Za-zÀ-ÖØ-öø-ÿ ,.'- ]{1,60}$"
    PatternLabel:
      type: string
      pattern: &PATTERN_LABEL '^[0-9A-Za-z._:-]{2,60}$'
    PatternLanguage:
      type: string
      pattern: &PATTERN_LANGUAGE '^[A-Za-z]{2,10}$'
    AnyValue: {}
    Object:
      type: object
      properties:
        id:
          type: string
          description: Unique id

    Contact:
      allOf:
        - required:
            - firstName
          type: object
          properties:
            firstName:
              type: string
              description: Name
            lastName:
              type: string
              description: Name
            language:
              type: string
            photo:
              type: string
              description: Profile picture URL
            status: &USER_STATUS
              type: string
              enum:
                - pending
                - validated
                - deactivated
            meta:
              type: object
            groups:
              type: array
              items:
                type: string
            membership:
              type: object
              description: Organization membership info (only returned when
                includeOrgMembership is set)
              properties:
                roleSlug:
                  type: string
                status:
                  type: string
                  enum:
                    - active
                    - invited
                    - suspended
                joinedAt:
                  type: string
                joinedVia:
                  type: string
                  enum:
                    - direct
                    - invite-code
                    - invite-email
                    - auto-join
                    - join-rule
                invitedAt:
                  type: string
                invitedBy:
                  type: string

        - $ref: '#/components/schemas/Object'

    SupportedMFA:
      type: string
      enum:
        - totp
        - none
        - '*'

    AuthData:
      type: object
      required:
        - id
      additionalProperties: true
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        language: {}

    User:
      allOf:
        - type: object
          properties:
            email:
              type: string
              example: foo@prisme.ai
            status: *USER_STATUS
            language:
              type: string
            authData:
              type: object
              properties:
                anonymous:
                  type: object
                prismeai:
                  type: object
                azure:
                  $ref: '#/components/schemas/AuthData'
              additionalProperties: true
            mfa:
              $ref: '#/components/schemas/SupportedMFA'
            meta:
              type: object
            orgSlugs:
              type: array
              items:
                type: string
            platformRole:
              type: string
            groupAcls:
              type: object
              additionalProperties:
                type: object
                additionalProperties: false
                properties:
                  role:
                    type: string
            createdAt:
              type: string
            updatedAt:
              type: string
            updatedBy:
              type: string
        - $ref: '#/components/schemas/Contact'

    UserPatch:
      type: object
      additionalProperties: false
      properties:
        firstName:
          type: string
          pattern: *PATTERN_NAME
        lastName:
          type: string
          pattern: *PATTERN_NAME
        email:
          type: string
          format: email
        status: *USER_STATUS
        meta:
          type: object
          additionalProperties: true
        platformRole:
          type: string
        groups:
          type: array
          items:
            type: string
        groupAcls:
          type: object
          additionalProperties:
            type: object
            additionalProperties: false
            properties:
              role:
                type: string

    App:
      type: object
      required:
        - workspaceId
        - slug
      properties:
        workspaceId:
          type: string
        versions:
          oneOf:
            - type: array
              items:
                type: string
            - type: array
              items:
                $ref: '#/components/schemas/WorkspaceVersion'
        name:
          type: string
        description:
          $ref: '#/components/schemas/LocalizedText'
        documentation:
          type: object
          required:
            - workspaceSlug
            - slug
          properties:
            workspaceSlug:
              type: string
            slug:
              type: string
        config:
          $ref: '#/components/schemas/Config'
        photo:
          type: string
        labels:
          type: array
          items:
            type: string
            pattern: *PATTERN_LABEL
        slug:
          type: string
        updatedAt:
          type: string
        createdAt:
          type: string
        updatedBy:
          type: string
        createdBy:
          type: string

    AppInstanceMeta:
      type: object
      required:
        - appSlug
      additionalProperties: false
      properties: &AppInstanceMeta
        appSlug:
          type: string
          description: 'App unique id'
        appName:
          $ref: '#/components/schemas/LocalizedText'
        appVersion:
          type: string
          description: 'Defaults to the latest known app version'
        slug:
          type: string
          description: Unique & human readable id across current workspace's appInstances,
            which will be used to call this app automations
        disabled:
          type: boolean
          description: If disabled, this appInstance will be ignored during execution
        labels:
          type: array
          items:
            type: string
            pattern: *PATTERN_LABEL
        updatedAt:
          type: string
        createdAt:
          type: string
        updatedBy:
          type: string
        createdBy:
          type: string
        checksum:
          type: string

    AppInstance:
      type: object
      required:
        - appSlug
      additionalProperties: false
      properties:
        <<: *AppInstanceMeta
        config: {}

    DetailedAppInstance:
      type: object
      required:
        - appSlug
        - slug
        - automations
        - blocks
        - events
      additionalProperties: false
      properties:
        <<: *AppInstanceMeta
        photo:
          type: string
        automations:
          $ref: '#/components/schemas/AppAutomations'
        events:
          $ref: '#/components/schemas/ProcessedEvents'
        blocks:
          $ref: '#/components/schemas/AppBlocks'

    ProcessedEvents:
      type: object
      properties:
        emit:
          type: array
          items:
            type: string
        listen:
          type: array
          items:
            type: string
        autocomplete:
          type: array
          items:
            type: object
            required:
              - event
            properties:
              event:
                type: string
                example: 'prismeaiMessenger.message'
              autocomplete:
                $ref: '#/components/schemas/EmitAutocomplete'

    AppAutomations:
      type: array
      items:
        type: object
        required:
          - slug
          - name
          - arguments
        properties:
          slug:
            type: string
          name:
            $ref: '#/components/schemas/LocalizedText'
          description:
            $ref: '#/components/schemas/LocalizedText'
          arguments:
            additionalProperties:
              $ref: '#/components/schemas/TypedArgument'

    AppBlocks:
      type: array
      items:
        type: object
        required:
          - slug
        properties:
          slug:
            type: string
          url:
            type: string
          edit:
            $ref: '#/components/schemas/TypedArgument'
          name:
            $ref: '#/components/schemas/LocalizedText'
          description:
            $ref: '#/components/schemas/LocalizedText'
          arguments:
            additionalProperties:
              $ref: '#/components/schemas/TypedArgument'

    Workspace:
      $ref: '#/components/schemas/DSUL'

    ## Workspace security & access control

    WorkspaceSecurity:
      type: object
      additionalProperties: false
      properties:
        authorizations:
          $ref: '#/components/schemas/WorkspaceAuthorizations'
        authentication:
          type: object
          properties:
            clientId:
              type: string

    WorkspaceAuthorizations:
      type: object
      additionalProperties: false
      properties:
        roles:
          additionalProperties:
            $ref: '#/components/schemas/WorkspaceRole'
        rules:
          type: array
          items:
            $ref: '#/components/schemas/PermissionRule'

    WorkspaceRole:
      type: object
      additionalProperties: false
      properties:
        description:
          type: string
        auth:
          type: object
          properties:
            prismeai:
              type: object
              properties:
                conditions:
                  type: object
                  additionalProperties: true
            azure:
              type: object
              properties:
                conditions:
                  type: object
                  additionalProperties: true
            basic:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
            apiKey:
              type: object

    SubjectTypes:
      type: string
      enum:
        - apps
        - pages
        - files
        - events
        - workspaces
        - automations
        - secrets
        - secure_secrets
        - workspace_keyrings
        - roles
        - orgs
        - orgs:members
        - orgs:groups
        - orgs:groups:members
        - orgs:invites
        - orgs:subscriptions
        - orgs:roles
        - orgs:apikeys
        - orgs:sso
        - orgs:service-accounts
        - users
        - all

    SharableSubjectTypes:
      type: string
      enum:
        - pages
        - workspaces

    ActionTypes:
      type: string
      enum:
        - manage
        - create
        - read
        - update
        - delete
        - manage_permissions
        - manage_security
        - manage_repositories
        - read_app_dsul
        - get_usage
        - aggregate_search
        - execute
        - test

    PermissionRule:
      type: object
      additionalProperties: false
      required:
        - action
        - subject
      properties:
        role:
          description: 'The roles to which this rule is restricted'
          oneOf:
            - type: array
              items:
                type: string
            - type: string
        inverted:
          type: boolean
          description: 'If true, will forbid instead of allow'
        reason:
          type: string
        action:
          description: 'The actions that we want to allow/deny'
          anyOf:
            - $ref: '#/components/schemas/ActionTypes'
            - type: array
              items:
                $ref: '#/components/schemas/ActionTypes'
            - type: string
            - type: array
              items:
                type: string
        subject:
          oneOf:
            - $ref: '#/components/schemas/SubjectTypes'
            - type: array
              items:
                $ref: '#/components/schemas/SubjectTypes'
        conditions:
          type: object
          description: 'Matching conditions written using a subset of MongoDB queries.
            This rule will take effect only if conditions match (or are empty).
            See https://casl.js.org/v5/en/guide/conditions-in-depth'
          additionalProperties: true
        fields:
          type: array
          items:
            type: string
          description: 'Field-level permissions. When specified, the rule only applies to
            these fields of the subject.'
        priority:
          type: number

    WorkspaceVersion:
      type: object
      required:
        - description
      properties:
        name:
          type: string
          description: 'Version name. If left empty, will be auto generated'
        createdAt:
          type: string
        description:
          $ref: '#/components/schemas/LocalizedText'
        repository:
          type: object
          additionalProperties: false
          properties:
            id:
              type: string
              description: 'Source or dest repository id as described in workspace
                configuration'

    WorkspaceGitRepositoryConfig:
      type: object
      required:
        - url
        - branch
      properties:
        url:
          type: string
        branch:
          type: string
        dirpath:
          type: string
          description: 'Sub-directory path within the repository where the workspace is
            stored'
        auth:
          type: object
          properties:
            user:
              type: string
            password:
              type: string
            sshkey:
              type: string

    WorkspaceFilesystemRepositoryConfig:
      type: object # Filesystem config
      required:
        - dirpath
      properties:
        dirpath:
          type: string
          description: 'Absolute path to the directory containing workspace folders'

    WorkspaceRepository:
      type: object
      required:
        - name
        - config
      additionalProperties: false
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - 'git'
            - 'archive'
            - 'filesystem'
        mode:
          type: string
          enum:
            - 'read-write'
            - 'read-only'
        config:
          anyOf:
            - $ref: "#/components/schemas/WorkspaceGitRepositoryConfig"
            - $ref: "#/components/schemas/WorkspaceFilesystemRepositoryConfig"
            - type: object # Empty config for archive
        groups:
          type: array
          description: "Only for platform repositories fetched from the Platform
            workspaces ; indicates which groups can be pulled/pushed"
          items:
            type: string
        pull:
          type: object
          properties:
            exclude:
              type: array
              items:
                type: object
                required:
                  - path
                properties:
                  path:
                    type: string

    WorkspaceEventConfiguration:
      type: object
      additionalProperties: false
      properties:
        schema:
          additionalProperties:
            $ref: '#/components/schemas/TypedArgument'

    WorkspaceEventsConfiguration:
      type: object
      additionalProperties: false
      properties:
        mapping:
          type: object
          additionalProperties: true
          description: 'Custom mapping which will be directly sent to underlying database
            (Elasticsearch/Opensearch)'
        types:
          description: 'Custom configuration per event type'
          additionalProperties:
            $ref: '#/components/schemas/WorkspaceEventConfiguration'

    WorkspaceWriteLock:
      type: object
      description: 'Lock preventing writes during versioning operations or unresolved
        merge conflicts'
      additionalProperties: false
      properties:
        lockedAt:
          type: string
        lockedBy:
          type: string
          description: 'User ID who initiated the lock'
        reason:
          type: string
          description: 'Reason for the lock (e.g., pull_in_progress, merge_conflict)'

    DSUL:
      type: object
      additionalProperties: false
      required:
        - name
      properties: &DSUL
        name:
          type: string
          pattern: *PATTERN_NAME
        description:
          $ref: '#/components/schemas/LocalizedText'
        photo:
          type: string
        config:
          $ref: '#/components/schemas/Config'
        blocks:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Block'
        slug:
          type: string
        id:
          type: string
        labels:
          type: array
          items:
            type: string
            pattern: *PATTERN_LABEL
        customDomains:
          type: array
          items:
            type: string
        registerWorkspace:
          type: boolean
          description: 'If true, make this workspace metadata available to all workspaces
            with this variable : {{global.workspacesRegistry[WORKSPACE_SLUG]}}'
        repositories:
          type: object
          description: 'Remote versioning repositories'
          additionalProperties:
            $ref: '#/components/schemas/WorkspaceRepository'
        platformRepositories:
          type: object
          description: 'Platform remote versioning repositories'
          additionalProperties:
            $ref: '#/components/schemas/WorkspaceRepository'
        secrets:
          type: object
          additionalProperties: false
          properties:
            schema:
              additionalProperties:
                $ref: '#/components/schemas/TypedArgument'
        events:
          $ref: '#/components/schemas/WorkspaceEventsConfiguration'
        writeLock:
          $ref: '#/components/schemas/WorkspaceWriteLock'

    RuntimeModel:
      allOf:
        - $ref: '#/components/schemas/DSUL'
        - type: object
          properties:
            automations:
              additionalProperties:
                $ref: '#/components/schemas/Automation'
            imports:
              additionalProperties:
                $ref: '#/components/schemas/AppInstance'

    DSULPatch:
      type: object
      additionalProperties: false
      properties:
        <<: *DSUL

    DSULReadOnly:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        <<: *DSUL
        automations:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AutomationMeta'
        pages:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/PageMeta'
        imports:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DetailedAppInstance'
        createdAt:
          type: string
        updatedAt:
          type: string
        createdBy:
          type: string
        id:
          type: string

    Config:
      type: object
      additionalProperties: false
      properties:
        schema:
          additionalProperties:
            $ref: '#/components/schemas/TypedArgument'
        block:
          type: string
        value: {}

    WorkspaceSecrets:
      type: object
      example:
        openaiApiKey:
          value: 'some secret api key'
        allowedModels:
          value:
            - gpt4
            - gpt4o
      additionalProperties:
        type: object
        required:
          - value
        properties:
          id:
            type: string
          value: {}
          description:
            type: string
          createdBy:
            type: string
          updatedBy:
            type: string
          createdAt:
            type: string
          updatedAt:
            type: string
          permissions:
            $ref: '#/components/schemas/PermissionsMap'

    WorkspaceSystemSecrets:
      type: object
      properties:
        prismeai_ratelimit_disabled: {}

        prismeai_ratelimit_automations: {}
        prismeai_ratelimit_emits: {}
        prismeai_ratelimit_fetchs: {}
        prismeai_ratelimit_repeats: {}

        prismeai_ratelimit_automations_burst: {}
        prismeai_ratelimit_emits_burst: {}
        prismeai_ratelimit_fetchs_burst: {}
        prismeai_ratelimit_repeats_burst: {}

    When:
      type: object
      anyOf:
        - required: ['events']
        - required: ['schedules']
        - required: ['endpoint']
        - {}
      properties:
        events:
          type: array
          items:
            type: string
          example:
            - prismeaiMessenger.event
        schedules:
          $ref: '#/components/schemas/Schedules'
        endpoint:
          oneOf:
            - type: boolean
              example: 'Set to true in order to activate HTTP endpoint. Slug will be trigger
                name by default'
            - type: string
              example: 'Slug name'

    Schedules:
      type: array
      items:
        type: string
      example:
        - 2021-12-25T00:00
        - '* * 1 * *'

    LocalizedText:
      oneOf:
        - type: object
          additionalProperties:
            type: string
          example:
            fr: 'Bonjour'
            en: 'Hello'
        - type: string
          example: Bonjour

    TypedArgument:
      type: object
      properties:
        type:
          type: string
          enum:
            - string
            - number
            - object
            - array
            - boolean
            - localized:string
            - localized:number
            - localized:boolean
        format:
          type: string
        properties:
          additionalProperties:
            $ref: '#/components/schemas/TypedArgument'
        title:
          $ref: '#/components/schemas/LocalizedText'
        description:
          $ref: '#/components/schemas/LocalizedText'
        items:
          $ref: '#/components/schemas/TypedArgument'
        ui:widget:
          type: string
        ui:options:
          type: object
        secret:
          type: boolean
        event:
          type: boolean

    InstructionList:
      type: array
      items:
        $ref: '#/components/schemas/Instruction'

    AutomationMeta:
      type: object
      required:
        - name
      additionalProperties: false
      properties: &AutomationMeta
        description:
          $ref: '#/components/schemas/LocalizedText'
        private:
          type: boolean
          description: "Set this to true if you don't want your automation to be
            accessible outside of your app. Default is false."
          example: false
        disabled:
          type: boolean
          description: 'Set this to true if you want to turn off this automation.'
          example: true
        name:
          $ref: '#/components/schemas/LocalizedText'
        slug:
          type: string
          description: Unique & human readable id across current workspace's automations
        arguments:
          additionalProperties:
            $ref: '#/components/schemas/TypedArgument'
        validateArguments:
          type: boolean
        when:
          $ref: '#/components/schemas/When'
        labels:
          type: array
          items:
            type: string
            pattern: *PATTERN_LABEL
        events:
          $ref: '#/components/schemas/ProcessedEvents'
        updatedAt:
          type: string
        createdAt:
          type: string
        updatedBy:
          type: string
        createdBy:
          type: string
        checksum:
          type: string

    Automation:
      type: object
      required:
        - do
        - name
      additionalProperties: false
      properties:
        <<: *AutomationMeta
        when:
          $ref: '#/components/schemas/When'
        arguments:
          additionalProperties:
            $ref: '#/components/schemas/TypedArgument'
        do:
          $ref: '#/components/schemas/InstructionList'
        output:
          description: 'Automation result expression. Might be a variable reference, an
            object/array with variables inside ...'
          example: '{{result}}'
        authorizations:
          type: object
          properties:
            action:
              type: string

    Block:
      type: object
      description: Block
      additionalProperties: false
      properties:
        description:
          $ref: '#/components/schemas/LocalizedText'
        name:
          $ref: '#/components/schemas/LocalizedText'
        photo:
          type: string
        url:
          type: string
          description: 'A block can be a javascript bundled file. Host it on the internet
            and put its url here.'
          deprecated: true
        edit:
          $ref: '#/components/schemas/TypedArgument'
          deprecated: true
        block:
          type: string
          description: A block can extends another one by giving its name here
          deprecated: true
        config:
          $ref: '#/components/schemas/AnyValue'
          description: 'default config applied to the Block. Usefull for extended Blocks.'
          deprecated: true
        automation:
          oneOf:
            - type: string
            - type: object
              properties:
                slug:
                  type: string
                payload:
                  $ref: '#/components/schemas/AnyValue'
        blocks:
          type: array
          items:
            type: object
            required:
              - slug
            properties:
              slug:
                type: string
              appInstance:
                type: string
              onInit:
                oneOf:
                  - type: string
                  - type: object
                    properties:
                      event:
                        type: string
                      payload:
                        $ref: '#/components/schemas/AnyValue'
              updateOn:
                type: string
              automation:
                oneOf:
                  - type: string
                  - type: object
                    properties:
                      slug:
                        type: string
                      payload:
                        $ref: '#/components/schemas/AnyValue'
            additionalProperties: true
        css:
          type: string
          description: Css applied to Block
        schema:
          $ref: '#/components/schemas/TypedArgument'

    PageMeta:
      type: object
      required:
        - name
      description: Page
      additionalProperties: false
      properties: &PageMeta
        name:
          $ref: '#/components/schemas/LocalizedText'
        description:
          $ref: '#/components/schemas/LocalizedText'
        workspaceId:
          type: string
        workspaceSlug:
          type: string
        id:
          type: string
        slug:
          type: string
        blocks:
          type: array
          items:
            type: object
            properties:
              slug:
                type: string
              appInstance:
                type: string
        labels:
          type: array
          items:
            type: string
            pattern: *PATTERN_LABEL
        events:
          $ref: '#/components/schemas/ProcessedEvents'
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        permissions:
          $ref: '#/components/schemas/PermissionsMap'
        customDomains:
          type: array
          items:
            type: string
        colorScheme:
          type: string
          enum:
            - auto
            - light
            - dark
        checksum:
          type: string
        favicon:
          type: string

    Page:
      type: object
      additionalProperties: false
      properties: &Page
        <<: *PageMeta
        blocks:
          type: array
          items:
            type: object
            required:
              - slug
            properties:
              slug:
                type: string
              appInstance:
                type: string
              onInit:
                oneOf:
                  - type: string
                  - type: object
                    properties:
                      event:
                        type: string
                      payload:
                        $ref: '#/components/schemas/AnyValue'
              updateOn:
                type: string
              automation:
                oneOf:
                  - type: string
                  - type: object
                    properties:
                      slug:
                        type: string
                      payload:
                        $ref: '#/components/schemas/AnyValue'
            additionalProperties: true
        styles:
          type: string
        onInit:
          oneOf:
            - type: string
            - type: object
              properties:
                event:
                  type: string
                payload:
                  $ref: '#/components/schemas/AnyValue'
        updateOn:
          type: string
        notifyOn:
          type: string
        automation:
          oneOf:
            - type: string
            - type: object
              properties:
                slug:
                  type: string
                payload:
                  $ref: '#/components/schemas/AnyValue'

    PageDetails:
      type: object
      required:
        - appInstances
      properties: &PageDetails
        appInstances:
          type: array
          items:
            type: 'object'
            properties:
              slug:
                type: string
              blocks:
                oneOf:
                  - type: object
                    additionalProperties:
                      $ref: '#/components/schemas/Block'
                    description: Map block slugs to their specification
                    example:
                      Dialog Manager.config:
                        url: https://cdn-assets.prisme.ai/widgets/nlu/setup-widget/main.js
                  - type: object
                    additionalProperties:
                      type: string
                    description: Map block slugs to their URL
                    example:
                      Dialog Manager.config: https://cdn-assets.prisme.ai/widgets/nlu/setup-widget/main.js
                    deprecated: true
        public:
          type: boolean
          description: 'Indicates whether this page is public. Reflects page permissions
            and cannot be set directly'
        apiKey:
          type: string
        clientId:
          type: string
        favicon:
          type: string

    DetailedPage:
      type: object
      required:
        - appInstances
        - slug
      properties:
        <<: [*Page, *PageDetails]

    File:
      type: object
      required:
        - name
        - url
        - mimetype
        - size
        - workspaceId
        - path
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
        mimetype:
          type: string
        size:
          type: number
        workspaceId:
          type: string
        path:
          type: string
        expiresAt:
          type: string
        expiresAfter:
          type: number
          description: Number of seconds after which the file will be automatically
            removed. This is currently a best effort expiration as it will be
            deleted only upon the next restart after expiration date.
        metadata:
          type: object
          additionalProperties: true
        public:
          type: boolean
          description: 'Reflects whether the file has public-read ACL at storage provider.
            True by default'
        shareToken:
          type: string
          description: 'A share token to append as a ?token query parameter to grant read
            access with given url'
        orgSlug:
          type: string
          nullable: true
          description: 'Organization slug set at creation time'

    ###############################################################################################################################################
    ############################################################ Automation Instructions ############################################################
    EmitAutocomplete:
      type: object
      additionalProperties:
        type: object
        properties:
          from:
            type: string
          path:
            type: string
          template:
            type: string
    Emit:
      type: object
      required:
        - emit
      maxProperties: 1
      properties:
        emit:
          type: object
          required:
            - event
          properties:
            event:
              type: string
              example: 'prismeaiMessenger.message'
            payload:
              $ref: '#/components/schemas/AnyValue'
            target:
              $ref: '#/components/schemas/PrismeEventTarget'
            private:
              type: boolean
            autocomplete:
              $ref: '#/components/schemas/EmitAutocomplete'
            options:
              $ref: '#/components/schemas/PrismeEventOptions'

    CreateUserTopic:
      type: object
      required:
        - createUserTopic
      maxProperties: 1
      properties:
        createUserTopic:
          $ref: '#/components/schemas/UserTopic'

    JoinUserTopic:
      type: object
      required:
        - joinUserTopic
      maxProperties: 1
      properties:
        joinUserTopic:
          type: object
          required:
            - topic
          properties:
            topic:
              type: string
              example: 'conversation:56'
            userIds:
              type: array
              items:
                type: string
              description: Subscribing user ids. If undefined, defaults to current user
            create:
              type: boolean
              description: 'Automatically create userTopic if it does not exist. Defaults:
                true'

    Wait:
      type: object
      required:
        - wait
      maxProperties: 1
      properties:
        wait:
          type: object
          required:
            - oneOf
          properties:
            oneOf:
              type: array
              items:
                type: object
                required:
                  - event
                properties:
                  event:
                    type: string
                    example: 'prismeaiMessenger.message'
                  filters:
                    type: object
                    description: "Only match the next event fulfilling these filters. Multiple
                      filters will be joined with an 'AND' operator "
                    additionalProperties:
                      type: string
                    example:
                      automationSlug: someId
                      someObjectField.someNestedField: 'foo'
                  cancelTriggers:
                    type: boolean
                    description: If true, do not send this event to the the usual triggers
            timeout:
              type: number
              description: After N seconds, timeout & outputs an empty result. Defaults to 20
            output:
              type: string
              description: Will save the caught event inside this variable
              example: nameOfResultVariable

    Set:
      type: object
      required:
        - 'set'
      maxProperties: 1
      properties:
        set:
          type: object
          required:
            - name
            - value
          properties:
            name:
              type: string
              description: Variable name, might be "foo", "session.sessionScopedFoo",
                "global.globalScopedFoo", "user.userScopedFoo", ...
            interface:
              type: string
              description: The ID of the schema form representing the structure of the value
            value:
              $ref: '#/components/schemas/AnyValue'
              description: variable value
            clone:
              type: boolean
              description: 'If true, will clone the provided object variable instead of a
                reference'
            type:
              type: string
              enum:
                - replace
                - merge
                - push
              description: 'Choose merge in order to merge target variable with value. Value
                takes precedence.'

    Delete:
      type: object
      required:
        - delete
      maxProperties: 1
      properties:
        delete:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: Variable name to remove

    Conditions:
      type: object
      required:
        - default
      properties:
        default:
          $ref: '#/components/schemas/InstructionList'
      additionalProperties:
        $ref: '#/components/schemas/InstructionList'
      minProperties: 2

    RepeatBatch:
      type: object
      title: Async
      description: 'Allows parallel execution in batches'
      properties:
        size:
          type: number
          title: Batch size
          description: 'Number of iterations executed at the same time. Each batch is only
            started after all iterations from previous batch are done'
        interval:
          type: number
          title: Interval
          description: 'Wait interval in ms between each batch'

    Repeat:
      type: object
      required:
        - 'repeat'
      maxProperties: 1
      properties:
        repeat:
          type: object
          oneOf:
            - required: ['on', 'do']
              properties:
                on:
                  type: string
                do:
                  $ref: '#/components/schemas/InstructionList'
                  hidden: true
                until:
                  type: number
                batch:
                  $ref: '#/components/schemas/RepeatBatch'
            - required: ['until', 'do']
              properties:
                until:
                  type: number
                do:
                  $ref: '#/components/schemas/InstructionList'
                  hidden: true
                batch:
                  $ref: '#/components/schemas/RepeatBatch'
          description: One of "on" or "until" is required

    All:
      type: object
      required:
        - 'all'
      maxProperties: 1
      properties:
        all:
          description: Execute each instruction in parallel. Pause current automation
            execution until all instructions are processed.
          type: array
          items:
            $ref: '#/components/schemas/Instruction'

    Break:
      type: object
      required:
        - 'break'
      maxProperties: 1
      properties:
        break:
          description: Stop current automation execution. Have one option that allow a
            break to break all parent automations.
          type: object
          properties:
            scope:
              type: string
              enum:
                - all
                - automation
                - repeat
              description: The scope argument defines in which scope the break will take
                effect. It only breaks the current automation by default, it can
                also break all parent automations. More options might become
                available in the future.
            payload:
              type: object
              additionalProperties: true
              description: 'An optional payload'

    Try:
      type: object
      required:
        - 'try'
      maxProperties: 1
      properties:
        try:
          type: object
          required: ['do']
          properties:
            do:
              $ref: '#/components/schemas/InstructionList'
              hidden: true
            catch:
              $ref: '#/components/schemas/InstructionList'
              hidden: true

    Auth:
      type: object
      required:
        - 'auth'
      maxProperties: 1
      properties:
        auth:
          type: object
          properties:
            workspace:
              type: boolean
              description: 'Include current workspace identity in generated jwt'

    Fetch:
      type: object
      required:
        - 'fetch'
      maxProperties: 1
      properties:
        fetch: &fetchBody
          description: Send an HTTP request
          type: object
          required:
            - url
          properties:
            url:
              type: string
            method:
              type: string
              enum:
                - get
                - post
                - put
                - patch
                - delete
            headers:
              type: object
              additionalProperties:
                type: 'string'
            prismeaiApiKey:
              type: object
              description: 'Only for requests towards prisme.ai API. Grants additional
                permissions using api keys'
              properties:
                name:
                  type: string
                  description: 'Use one of the DSUL Security defined api keys, referred by its
                    name.'

            query:
              type: object
              description: Object defining querystring parameters
              additionalProperties:
                type: 'string'
            body:
              description: HTTP request body
              $ref: '#/components/schemas/AnyValue'
            emitErrors:
              description: 'If HTTP response status code is 4xx or 5xx, emits a
                runtime.fetch.failed event by default'
              type: boolean
              default: true
            multipart:
              description: Sends a multipart/form-data HTTP request
              type: array
              items:
                type: object
                required:
                  - fieldname
                  - value
                properties:
                  fieldname:
                    type: string
                  value:
                    type: string
                    description: Must be a string. Raw files must be given as base64
                  filename:
                    type: string
                    description: 'Filename is required when value is a base64 encoded file'
                  contentType:
                    type: string
                    description: Optional MIME content-type
            allowSelfSignedCert:
              description: Allow self signed https certificates
              type: boolean
            output:
              type: string
              description: Name of the variable which will hold the result
            stream:
              type: object
              description: 'By default, SSE chunks are written to the output variable which
                can be read in real time using repeat instruction. Change this
                behaviour to emit chunks as individual events instead.'
              required:
                - event
              properties:
                event:
                  type: string
                endChunk:
                  description: 'Allows to configure a custom ending chunk'
                concatenate:
                  type: object
                  properties:
                    path:
                      type: string
                    throttle:
                      type: number
                payload:
                  type: object
                  additionalProperties: true
                target:
                  $ref: '#/components/schemas/PrismeEventTarget'
                options:
                  $ref: '#/components/schemas/PrismeEventOptions'
            outputMode:
              type: string
              default: body
              enum:
                - body
                - detailed_response
                - data_url
                - base64
            auth:
              type: object
              title: 'Authentication'
              properties:
                prismeai:
                  type: object
                  title: 'Prisme.ai'
                  properties:
                    forwardWorkspaceAuth:
                      type: boolean
                      description: 'Enable in order to forward previously authenticated workspace in
                        this fetch'
                awsv4:
                  type: object
                  additionalProperties: true
                  title: 'AWS Signature V4'
                  properties:
                    accessKeyId:
                      type: string
                      title: 'Access Key ID'
                    secretAccessKey:
                      type: string
                      title: 'Secret Access Key'
                    service:
                      type: string
                    region:
                      type: string

    RateLimit:
      type: object
      required:
        - rateLimit
      maxProperties: 1
      properties:
        rateLimit:
          type: object
          required:
            - name
            - consumer
            - window
            - limit
          properties:
            name:
              type: string
              description: 'Name your rate limit'
              example: 'ApiCall'
            consumer:
              description: 'Consumer identifying key like user id, ip, ... '
              type: string
            window:
              type: number
              description: 'Fixed time window length in seconds.'
            limit:
              type: number
              description: 'Maximum number of points which can be consumed over the given
                window'
            consume:
              type: number
              description: 'Number of points consumed for 1 rateLimit call, defaults to 1'
            break:
              type: boolean
              description: 'Set to false in order to return reached limit error instead of
                breaking current automation'
            output:
              type: string
              description: Will save the caught event inside this variable
              example: nameOfResultVariable

    Run:
      type: object
      required:
        - 'run'
      maxProperties: 1
      properties:
        run:
          type: object
          description: Generic run instruction to execute various function modules
          required:
            - module
            - function
          properties:
            module:
              type: string
            function:
              type: string
            parameters:
              $ref: '#/components/schemas/AnyValue'
            onError:
              type: string
              default: break
              enum:
                - break
                - emit
                - continue

    Comment:
      type: object
      required:
        - 'comment'
      maxProperties: 1
      properties:
        comment:
          description: Do nothing but display a comment in instructions list
          type: string

    Instruction:
      anyOf:
        - $ref: '#/components/schemas/Emit'
        - $ref: '#/components/schemas/Wait'
        - $ref: '#/components/schemas/Set'
        - $ref: '#/components/schemas/Delete'
        - $ref: '#/components/schemas/Conditions'
        - $ref: '#/components/schemas/Repeat'
        - $ref: '#/components/schemas/All'
        - $ref: '#/components/schemas/Break'
        - $ref: '#/components/schemas/Fetch'
        - $ref: '#/components/schemas/Comment'
        - $ref: '#/components/schemas/RateLimit'
        - $ref: '#/components/schemas/Run'
        - type: object
          additionalProperties: true
          minProperties: 1
          maxProperties: 1

    AutomationResult:
      type: object
      required:
        - slug
      properties:
        slug:
          type: string
        output:
          $ref: '#/components/schemas/AnyValue'

    ################################################################################################################################
    ################################################# Permissions ##################################################################
    PermissionsList:
      type: array
      items:
        $ref: '#/components/schemas/UserPermissions'
      example:
        - target:
            id: userId1
          permissions:
            role: admin
        - target:
            id: userId2
          permissions:
            policies:
              read: true
        - target:
            public: true
          permissions:
            policies:
              read: true

    Role:
      type: string

    Policies:
      properties:
        read:
          type: boolean
        write:
          type: boolean
        update:
          type: boolean
        create:
          type: boolean
        manage_permissions:
          type: boolean

    UserPermissionsTarget:
      type: object
      anyOf:
        - required: ['id']
        - required: ['public']
        - required: ['role']
      properties:
        id:
          type: string
        public:
          type: boolean
        role:
          type: string
        displayName:
          type: string

    UserPermissions:
      type: object
      additionalProperties: false
      required:
        - target
        - permissions
      properties: &UserPermissions
        target:
          $ref: '#/components/schemas/UserPermissionsTarget'
        permissions:
          type: object
          properties:
            role:
              $ref: '#/components/schemas/Role'
            policies:
              $ref: '#/components/schemas/Policies'

    PermissionsMap:
      type: object
      additionalProperties:
        type: object
        properties:
          role:
            $ref: '#/components/schemas/Role'
          policies:
            $ref: '#/components/schemas/Policies'

    AuthProviderType:
      type: string
      enum:
        - oidc
        - saml

    AuthProviderOidcConfig:
      type: object
      required:
        - client_id
        - authorization_endpoint
        - token_endpoint
        - jwks_uri
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        scopes:
          type: array
          items:
            type: string
        state:
          type: boolean
        jwks_uri:
          type: string
        pkce:
          type: boolean

    AuthProviderSamlConfig:
      type: object
      properties:
        idp_metadata_filepath:
          type: string
          description: "Absolute path to the SAML XML config file in the container"
        idp_metadata_xml:
          type: string
          description: "Raw SAML XML config"
        issuer:
          type: string
          description: "Required"
        audience:
          type: string
          description: "Required, should match issuer"
        skipRequestCompression:
          type: boolean
        wantAuthnResponseSigned:
          type: boolean
        identifierFormat:
          type: string
          description: "Required if neither idp_metadata_xml or idp_metadata_filepath are
            configured"
        identityProviderUrl:
          type: string
          description: "Required if neither idp_metadata_xml or idp_metadata_filepath are
            configured"
        entryPoint:
          type: string
          description: "Required if neither idp_metadata_xml or idp_metadata_filepath are
            configured"
        logoutUrl:
          type: string
        idpCert:
          type: string
          description: "Required if neither idp_metadata_xml or idp_metadata_filepath are
            configured"

    AuthProvider:
      type: object
      required:
        - slug
        - type
        - config
      properties:
        id:
          type: string
        slug:
          type: string
          description: Unique provider identifier (e.g. "google", "okta-saml")
        name:
          type: string
          description: Display name for the provider (e.g. "Google", "Corporate SSO")
        icon:
          type: string
          description: Icon URL or identifier for the provider
        type:
          $ref: "#/components/schemas/AuthProviderType"
          description: Authentication protocol type
        config:
          type: object
          additionalProperties: true
          description: Provider-specific configuration (OIDC or SAML settings)
          anyOf:
            - $ref: "#/components/schemas/AuthProviderOidcConfig"
            - $ref: "#/components/schemas/AuthProviderSamlConfig"
        attributesMapping:
          type: object
          additionalProperties:
            type: string
          properties:
            firstName:
              type: string
            lastName:
              type: string
            email:
              type: string
          description: Maps provider claims to user fields (e.g. firstName, email)
        source:
          type: string
          enum:
            - file
            - database
          description: Where this provider is configured (read-only, returned by GET)
        enabled:
          type: boolean
          description: Whether this provider is active (default true). Disabled providers
            are not registered as passport strategies.
        meta:
          type: object
          additionalProperties: true
          description: Free-form metadata JSON
        domains:
          type: array
          items:
            type: string
          description: Associated domain names
        orgSlug:
          type: string
          description: Associated organization slug

    AccessToken:
      type: object
      required:
        - expiresAt
        - name
      properties:
        expiresAt:
          type: string
        name:
          type: string
        token:
          type: string
        userId:
          type: string
        id:
          type: string

    ApiKey:
      type: object
      additionalProperties: false
      required:
        - apiKey
        - rules
        - subjectType
        - subjectId
      properties:
        name:
          type: string
        apiKey:
          type: string
        subjectType:
          type: string
        subjectId:
          type: string
        rules:
          type: array
          items:
            $ref: '#/components/schemas/PermissionRule'
        disabled:
          type: boolean

    ################################################################################################################################
    ############################################################ Workspace Usage ############################################################
    WorkspaceUsage:
      type: object
      required:
        - workspaceId
        - beforeDate
        - afterDate
        - total
        - apps
      properties:
        workspaceId:
          type: string
        beforeDate:
          type: string
        afterDate:
          type: string
        interval:
          type: string
        total:
          $ref: '#/components/schemas/UsageMetrics'
        timeseries:
          type: array
          items:
            properties:
              date:
                type: string
              total:
                $ref: '#/components/schemas/UsageMetrics'
              apps:
                type: array
                items:
                  $ref: '#/components/schemas/AppUsageMetrics'
        apps:
          type: array
          items:
            $ref: '#/components/schemas/AppUsageMetrics'

    UsageMetrics:
      type: object
      required:
        - transactions
        - httpTransactions
        - eventTransactions
        - scheduleTransactions
        - sessions
        - users
      additionalProperties: false
      properties:
        transactions:
          type: number
        httpTransactions:
          type: number
        eventTransactions:
          type: number
        scheduleTransactions:
          type: number
        sessions:
          type: number
        users:
          type: number

    AppUsageMetrics:
      type: object
      required:
        - slug
        - total
      properties:
        slug:
          type: string
        total:
          type: object
          required:
            - custom
          properties:
            custom:
              type: object
              additionalProperties: true
        appInstances:
          type: array
          items:
            type: object
            required:
              - slug
              - total
            properties:
              slug:
                type: string
              total:
                type: object
                required:
                  - custom
                properties:
                  custom:
                    type: object
                    additionalProperties: true

    ##################################################################################################################################
    ############################################################# Events #############################################################
    PrismeEventTarget:
      type: object
      properties:
        userTopic:
          type: string
        userId:
          type: string
        sessionId:
          type: string
        currentSocket:
          type: boolean
          default: true
          description: 'If emitted in response to an active socket (i.e source.socketId is
            set), this event is only visible to this same socket. Defaults to
            true'

    PrismeEventOptions:
      type: object
      properties:
        persist:
          type: boolean
          description: 'Whether to persist this event or not. Defaults to true'
          default: true
        aggPayload:
          type: boolean
          default: false
          description: 'Populate advanced aggregation payload for custom mappings &
            analytics. This is automatically enabled for events mapped in
            config.events.types.*'
        async:
          type: boolean
          default: false
          description: 'If true, the instruction will return control without waiting for
            the event to be emitted. Defaults to false'

    PrismeEvent:
      type: object
      required:
        - type
        - source
        - createdAt
        - id
        - size
      properties:
        type:
          type: string
          example: apps.someApp.someCustomEvent
        source:
          type: object
          properties:
            appSlug:
              type: string
            appInstanceFullSlug:
              type: string
            appInstanceDepth:
              type: number
            automationSlug:
              type: string
            automationDepth:
              type: number
            userId:
              type: string
            ip:
              type: string
            sessionId:
              type: string
            workspaceId:
              type: string
            socketId:
              type: string
            host:
              type: object
              required:
                - service
              properties:
                service:
                  type: string
            correlationId:
              type: string
            serviceTopic:
              type: string
        payload:
          $ref: '#/components/schemas/AnyValue'
        target:
          $ref: '#/components/schemas/PrismeEventTarget'
        options:
          $ref: '#/components/schemas/PrismeEventOptions'
        error:
          type: object
          properties:
            error:
              type: string
            message:
              type: string
            details:
              $ref: '#/components/schemas/AnyValue'
            level:
              type: string
              enum:
                - warning
                - error
                - fatal
              example: warning
        createdAt:
          type: string
          description: Creation date (ISO8601)
        id:
          type: string
        size:
          type: number

    AppUsageEvent:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          example: usage
          enum:
            - usage
        payload:
          type: object
          required:
            - metrics
          properties:
            metrics:
              type: object
              additionalProperties:
                type: object
                required:
                  - value
                  - action
                properties:
                  value:
                    type: number
                  action:
                    type: string
                    enum:
                      - set
                      - increment

    AllEventRequests:
      type: array
      items:
        anyOf:
