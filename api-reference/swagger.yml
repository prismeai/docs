          example: gateway.users.bulkUpdated
          enum:
            - gateway.users.bulkUpdated
        payload:
          type: object
          required:
            - query
            - data
            - result
          properties:
            query:
              type: object
              oneOf:
                - required:
                    - ids
                - required:
                    - emails
              properties:
                ids:
                  type: array
                  items:
                    type: string
                emails:
                  type: array
                  items:
                    type: string
            behaviour:
              type: object
              properties:
                groups:
                  type: string
                  enum:
                    - replace
                    - add
                    - delete
            data:
              type: object
              description: The data object that was applied to the users
            result:
              type: object
              required:
                - requestedCount
                - matchedCount
                - modifiedCount
              properties:
                requestedCount:
                  type: integer
                  description: Number of users requested to be updated
                matchedCount:
                  type: integer
                  description: Number of users that matched the query
                modifiedCount:
                  type: integer
                  description: Number of users that were actually modified

