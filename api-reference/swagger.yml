            application/json:
              schema:
                $ref: '#/components/schemas/File'
        '404':
          description: Object not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectNotFoundError'
        '401':
          description: AuthenticationError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationError'
        '403':
          description: Bad permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'

    delete:
      summary: Delete File
      description: Delete a file
      operationId: deleteFile
      tags:
        - 'Prisme.ai Workspaces'
      parameters:
        - name: 'workspaceId'
          in: 'path'
          description: 'Workspace id'
          required: true
          schema:
            type: string
        - name: 'id'
          in: 'path'
          description: 'File id'
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
        '404':
          description: Object not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectNotFoundError'
        '401':
          description: AuthenticationError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationError'
        '403':
          description: Bad permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'

    patch:
      summary: Update File
      description: Update file
      operationId: updateFile
      tags:
        - 'Prisme.ai Workspaces'
      parameters:
        - name: 'workspaceId'
          in: 'path'
          description: 'Workspace id'
          required: true
          schema:
            type: string
        - name: 'id'
          in: 'path'
          description: 'File id'
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                expiresAfter:
                  description: File expiration time in seconds. This is currently a best effort
                    expiration as it will be deleted only upon the next restart
                    after expiration
                  oneOf:
                    - type: string
                    - type: number
                public:
                  description: 'Set to true to make uploaded file publicly available'
                  oneOf:
                    - type: string
                    - type: boolean
                shareToken:
                  description: 'If enabled, return a share token that will allow anybody access
                    the file'
                  oneOf:
                    - type: string
                    - type: boolean
                metadata:
                  type: object
                  additionalProperties: true

      responses:
        '200':
          description: Success Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/File'
        '401':
          description: AuthenticationError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationError'
        '403':
          description: Bad permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '400':
          description: Bad parameters
