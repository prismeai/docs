  /v2/workspaces/platform/versions/latest/pull:
    post:
      summary: Pull Platform Versions
      description: >
        Trigger a bulk import of workspaces from a platform repository.
        Clones/pulls the repository once, then imports each workspace in
        dependency order (topological sort on .import.yml dependsOn). Workspaces
        already at the current version are skipped.
      operationId: PullPlatformVersions
      tags:
        - 'Prisme.ai Workspaces'
      parameters:
        - name: 'timeout'
          in: 'query'
          description: 'HTTP timeout in seconds (default 15s). If the import exceeds this,
            the response returns {processing: true} and the result is emitted as
            a workspaces.bulkImport.completed event.'
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repository:
                  type: object
                  required:
                    - id
                  properties:
                    id:
                      type: string
                      description: Platform repository ID (from WORKSPACES_STORAGE_GIT_PLATFORM_* env
                        vars)
                groups:
                  type: array
                  items:
                    type: string
                  description: >
                    Filter workspaces by group names. Only workspaces whose
                    .import.yml groups field includes at least one of these
                    values will be imported. Takes precedence over `group` when
                    both are provided.
                forceReimport:
                  type: boolean
                  default: false
                  description: >
                    When true, forces re-import of all workspaces regardless of
                    version. By default, workspaces whose lastPull.version
                    already matches the repository version are skipped.
      responses:
        '200':
          description: Bulk import result
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    description: Import still processing (HTTP timeout reached)
                    properties:
                      processing:
                        type: boolean
                      message:
                        type: string
                  - $ref: '#/components/schemas/BulkImportCompleted/properties/payload'
        '400':
          description: Bad parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadParametersError'
        '401':
          description: AuthenticationError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationError'
        '403':
          description: Bad permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown platform repository
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectNotFoundError'

  /v2/workspaces/platform/versions:
    post:
      summary: Push Platform Versions
      description: >
        Trigger a bulk push of dirty workspaces to a platform repository. Finds
        all dirty workspaces belonging to the given groups, categorizes them by
        lock status (merge conflicts, in progress, candidates), then pushes each
        candidate workspace sequentially. Groups are resolved via
        WORKSPACE_GROUPS configuration.
      operationId: PushPlatformVersions
      tags:
        - 'Prisme.ai Workspaces'
      parameters:
        - name: 'sse'
          in: 'query'
          description: 'If true, streams progress as Server-Sent Events
            (text/event-stream) instead of returning a single JSON response.'
          schema:
            type: boolean
        - name: 'timeout'
          in: 'query'
          description: 'HTTP timeout in seconds. If the push exceeds this, the response
            returns {processing: true} and the result is emitted as a
            workspaces.bulkExport.completed event.'
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groups:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  description: Group names to push (must exist in WORKSPACE_GROUPS config)
                repository:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Platform repository ID (defaults to prismeai-workspaces)
                name:
                  type: string
                  description: 'Version name. If left empty, will be auto generated'
                createdAt:
                  type: string
                description:
                  $ref: '#/components/schemas/LocalizedText'
                dryRun:
                  type: boolean
                  default: false
                  description: >
                    When true, only returns workspace categorization without
                    actually pushing any versions.
                force:
                  type: boolean
                  default: false
                  description: >
                    When true, also pushes workspaces that are already up to
                    date (not dirty), forcing a re-push of all matching
                    workspaces.
      responses:
        '200':
          description: Bulk push result or SSE stream
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    description: Push still processing (HTTP timeout reached)
                    properties:
                      processing:
                        type: boolean
                      message:
                        type: string
                  - $ref: '#/components/schemas/BulkPushCompleted/properties/payload'
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream with progress updates
        '400':
          description: Bad parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadParametersError'
        '401':
          description: AuthenticationError
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationError'
        '403':
          description: Bad permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown platform repository or group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectNotFoundError'

