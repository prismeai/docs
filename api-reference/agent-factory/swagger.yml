              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Artifacts]
      operationId: updateArtifact
      summary: Update artifact content (full replace OR line patches)
      description: |
        Two mutation modes - exactly one of `content` (full replace,
        creates a new version) or `patches` (line-level operations,
        applied atomically) MUST be present. `base_version` opts into
        optimistic concurrency control.
      parameters:
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactPatchInput'
            example:
              content: Updated greeting message
              change_summary: Updated greeting message
      responses:
        '200':
          description: New version persisted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: |
                  Helper-defined update result - includes the new
                  `current_version`, `total_versions`, and (for `patches`
                  mode) the resolved diff/version metadata.
        '400':
          description: Validation error - neither `content` nor `patches` provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - only the owner can mutate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Artifact not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Optimistic concurrency conflict (`base_version` mismatch).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Artifacts]
      operationId: deleteArtifact
      summary: Delete an artifact and all of its versions
      parameters:
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
      responses:
        '200':
          description: Artifact deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactDeleteResult'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - only the owner can delete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Artifact not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
