  /v1/agents/{agentId}/tasks/{taskId}/resolve:
    post:
      tags: [Tasks]
      operationId: resolveTask
      summary: Resolve a pending HITL approval (external approver)
      description: |
        External approval endpoint for tasks parked in
        `input-required`. The caller is the approver - distinct from
        the chatting user - and is authorized via the task's
        `pending_approval.approvers` list. On `approved: true`, the
        agent loop resumes; on `approved: false`, the task is failed
        with the supplied reason.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskResolveInput'
      responses:
        '200':
          description: Resolved task summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResolveResponse'
        '400':
          description: Validation error (`approved` missing or non-boolean).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller is not an authorized approver for this task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed (only POST is accepted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Resolved successfully but the resumed action failed mid-execution.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
