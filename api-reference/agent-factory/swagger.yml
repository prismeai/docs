  /v1/a2a:
    get:
      tags: [A2A]
      operationId: legacyA2aTaskSnapshot
      summary: Legacy A2A gateway - task snapshot dispatch (GET)
      description: |
        Backward-compatible legacy gateway. `GET /v1/a2a?taskId=xxx`
        looks up the task's `_agent_id` and forwards to the per-agent
        endpoint `GET /v1/agents/{agentId}/a2a?taskId=xxx`. New clients
        should call the per-agent path directly.
      parameters:
        - name: taskId
          in: query
          required: true
          schema:
            type: string
            maxLength: 128
      responses:
        '200':
          description: Task snapshot (forwarded from the per-agent endpoint).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSnapshot'
        '404':
          description: Task not found (rendered as a JSON-RPC error envelope).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcErrorEnvelope'
    post:
      tags: [A2A]
      operationId: legacyAgentToAgentCall
      summary: Legacy A2A gateway - JSON-RPC 2.0 dispatch (POST)
      description: |
        Backward-compatible legacy JSON-RPC 2.0 gateway. The body MUST
        include `params.id` (the target agent ID); the gateway forwards
        the call to `POST /v1/agents/{agentId}/a2a`. Returns the
        forwarded JSON-RPC response or a JSON-RPC error envelope.

        Recognised methods on the underlying per-agent endpoint:
        `message/send`, `message/stream`, `tasks/get`, `tasks/cancel`,
        `tasks/sendSubscribe`, `agent/getCard`, `agent/getExtendedCard`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacyJsonRpcRequest'
      responses:
        '200':
          description: |
            JSON-RPC 2.0 response. `result` is the forwarded result
            envelope; alternatively `error` carries a JSON-RPC error
            object when the dispatch failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcResponse'
        '400':
          description: Invalid JSON-RPC envelope (returned as a JSON-RPC error response).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcErrorEnvelope'
  /v1/agents/{agentId}/a2a:
    get:
      tags: [A2A]
      operationId: agentTaskSnapshotA2a
      summary: A2A task snapshot (per-agent, GET)
      description: |
        Per-agent A2A gateway snapshot endpoint. `GET ?taskId=xxx`
        validates the task belongs to this agent then forwards to
        `getTaskSnapshot`. Returns a JSON-RPC error envelope when the
        task does not belong to the agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
        - name: taskId
          in: query
          required: true
          schema:
            type: string
            maxLength: 128
      responses:
        '200':
          description: Task snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSnapshot'
        '404':
          description: Task not found for this agent (JSON-RPC error envelope).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcErrorEnvelope'
    post:
      tags: [A2A]
      operationId: agentToAgentCall
      summary: A2A JSON-RPC 2.0 dispatch (per-agent)
      description: |
        Per-agent JSON-RPC 2.0 entry point. The agent ID is taken from
        the path - `params.id` is ignored. Recognised methods include
        `message/send`, `message/stream`, `tasks/get`, `tasks/cancel`,
        `tasks/sendSubscribe`, `agent/getCard`, `agent/getExtendedCard`.
        For first-class consumers the dedicated REST endpoints
        (`/messages/send`, `/messages/stream`, `/tasks/{taskId}`, etc.)
        are preferred - this endpoint exists for A2A interoperability.

        Note: `tasks/sendSubscribe` directly streams Server-Sent Events
        without a JSON-RPC wrapper - it does not produce the
        `application/json` body documented here.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonRpcRequest'
      responses:
        '200':
          description: |
            JSON-RPC 2.0 response. Carries `result` on success or
            `error` on failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcResponse'
        '400':
          description: Invalid JSON-RPC envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcErrorEnvelope'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
