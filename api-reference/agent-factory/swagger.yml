openapi: '3.0.3'
info:
  version: 1.0.0
  title: Agent Factory API
  description: |
    Public REST API for the Agent Factory workspace - agents, conversations,
    messages, tools, artifacts, sharing, ratings, and discovery.
    Powered by Prisme.ai's runtime; all endpoints are exposed under each
    workspace's webhook namespace.
  contact:
    name: Prisme.ai
    url: https://prisme.ai
servers:
  - url: https://{host}/v2/workspaces/slug:agent-factory/webhooks
    description: Prisme.ai workspace webhooks
    variables:
      host:
        default: api.studio.prisme.ai
        description: API host (override for self-hosted or sandbox)
security:
  - BearerAuth: []
  - WorkspaceApiKeyAuth: []
tags:
  - name: Agents
    description: Agent CRUD, discovery, AGENTS.md import/export.
  - name: Access
    description: Agent access bindings, sharing, and access requests.
  - name: ApiKeys
    description: Agent-scoped API key management (mint, revoke, rotate).
  - name: Publishing
    description: Publish or discard draft changes on an agent.
  - name: Ratings
    description: User ratings on published agents.
  - name: Profiles
    description: Agent profiles/presets catalog (simple, workflow, agent_light, agent_full, orchestrator).
  - name: Activity
    description: Activity feed for agents (events, errors, lifecycle changes).
  - name: Analytics
    description: Agent usage analytics (series + summary).
  - name: Conversations
    description: Conversations on an agent (CRUD, archive, star).
  - name: Messages
    description: Send messages to an agent (synchronous send + SSE stream).
  - name: Tasks
    description: Async task lifecycle (list, fetch, cancel, resolve, subscribe).
  - name: Artifacts
    description: Generated artifacts (files, code, content) attached to a task.
  - name: Shares
    description: Conversation, message, and artifact share-link snapshots.
  - name: A2A
    description: Agent-to-agent JSON-RPC 2.0 gateway (well-known agent.json + RPC).
  - name: Tools
    description: Per-agent tool catalogue (system tools, MCP servers, function tools).
  - name: Retention
    description: Per-agent and org-wide conversation retention policies.
  - name: Evaluations
    description: Agent evaluation runs and results.
paths:
  /v1/profiles:
    get:
      tags: [Profiles]
      operationId: listProfiles
      summary: List available agent profiles (presets)
      description: |
        Returns the catalog of agent profiles (`simple`, `workflow`,
        `agent_light`, `agent_full`, `orchestrator`) with their feature
        flags, limits, and recommended use cases.
      responses:
        '200':
          description: Catalog of agent profiles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileListResponse'
        '400':
          description: Invalid arguments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed (only GET is accepted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/activity:
    get:
      tags: [Activity]
      operationId: getActivity
      summary: Get the activity feed for an agent
      description: |
        Activity feed of agent interactions, errors, lifecycle and config
        changes, conversations, artifacts, ratings, access changes, and
        share events. Backed by Elasticsearch.
      parameters:
        - name: agent_id
          in: query
          required: true
          schema:
            type: string
            maxLength: 64
          description: Agent identifier (required).
        - name: groups
          in: query
          required: false
          schema:
            type: string
            maxLength: 256
          description: Comma-separated list of activity groups (`message`, `error`, `agent_lifecycle`, `conversation`, `artifact`, `rating`, `access`, `share`).
        - name: since
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
          description: ISO timestamp lower bound.
        - name: until
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
          description: ISO timestamp upper bound.
        - name: correlationId
          in: query
          required: false
          schema:
            type: string
            maxLength: 128
          description: Filter by correlationId to trace a single workflow.
        - name: limit
          in: query
          required: false
          schema:
            type: string
          description: Page size (default 25).
        - name: page
          in: query
          required: false
          schema:
            type: string
          description: Page number (1-indexed, default 1).
      responses:
        '200':
          description: Page of activity items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityListResponse'
        '400':
          description: Missing `agent_id` or invalid arguments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed (only GET is accepted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/agents/{agentId}/analytics:
    get:
      tags: [Analytics]
      operationId: getAgentAnalytics
      summary: Get analytics (series + summary) for an agent
      description: |
        Returns metrics series and an aggregated summary for a single agent.
        Series is read from Mongo; summary is cached and recomputed from
        Elasticsearch on miss/stale (custom date ranges always recompute).
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
        - name: period
          in: query
          required: false
          schema:
            type: string
            maxLength: 16
            enum: [15m, 30m, 1h, 1d, 7d, 30d, 90d]
          description: Preset period. Default `30d`.
        - name: start
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
          description: ISO start (custom range). Overrides `period`.
        - name: end
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
          description: ISO end (custom range, exclusive).
        - name: granularity
          in: query
          required: false
          schema:
            type: string
            maxLength: 16
            enum: [5m, hourly, daily]
          description: Override granularity (auto-picked from period otherwise).
      responses:
        '200':
          description: Analytics payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentAnalytics'
        '400':
          description: Invalid arguments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/agents:
    get:
      tags: [Agents]
      operationId: listAgents
      summary: List agents
      description: |
        List agents with multi-scope filter. Supported scopes (comma-separated):
        `own`, `shared`, `published`, `all`. Default `own`. The reserved
        action `?action=explore` returns all public+restricted published
        agents in the caller's organization.
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
          description: Comma-separated list (`own`, `shared`, `published`, `all`).
        - name: action
          in: query
          required: false
          schema:
            type: string
            maxLength: 32
            enum: [explore, write]
          description: Reserved action (`explore` for store-style discovery, `write` to filter to writable scope).
        - name: status
          in: query
          required: false
          schema:
            type: string
            maxLength: 32
        - name: category
          in: query
          required: false
          schema:
            type: string
            maxLength: 128
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
        - name: sort
          in: query
          required: false
          schema:
            type: string
            maxLength: 32
            enum: [updatedAt, createdAt]
        - name: limit
          in: query
          required: false
          schema:
            type: string
          description: Page size (max 100, default 20).
        - name: page
          in: query
          required: false
          schema:
            type: string
          description: 1-indexed page number.
      responses:
        '200':
          description: Page of agents (with `published_config` stripped on list rows).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
        '400':
          description: Invalid arguments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Agents]
      operationId: createAgent
      summary: Create a new agent
      description: |
        Create a new agent in the caller's organization. The agent starts
        in `draft` status and `private` visibility. A service account is
        provisioned automatically; failure to provision rolls back the
        creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreateInput'
            example:
              name: Test Agent
              description: Agent created by automated test
              instructions: You are a helpful test assistant.
              model: gpt-4o-mini
              temperature: 0.7
      responses:
        '200':
          description: Agent created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCreateResponse'
        '400':
          description: Validation error (e.g. missing `instructions`, too many sub_agents/starters).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Service account provisioning failed (agent record rolled back).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/agents/{agentId}:
    get:
      tags: [Agents]
      operationId: getAgent
      summary: Get a single agent by ID
      description: |
        Returns the agent record. Owners see the full record (including
        `published_config`). Non-owners with binding receive the record
        with `published_config` stripped. Restricted agents seen by
        callers without binding return only public-facing fields.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: Agent record (Agent or AgentRestrictedView depending on caller's access).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Agent'
                  - $ref: '#/components/schemas/AgentRestrictedView'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Agents]
      operationId: updateAgent
      summary: Update an agent (partial update)
      description: |
        Partially update agent fields. Setting `status: draft` clears the
        `published_config` snapshot. If the agent is `published`,
        `has_draft_changes` is automatically set to `true`.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdateInput'
            example:
              description: Updated description by test
              temperature: 0.5
      responses:
        '200':
          description: Updated agent record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          description: Validation error (invalid visibility, status, sub_agents, starters, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Agents]
      operationId: deleteAgent
      summary: Delete an agent and its associated data
      description: |
        Cascading delete: removes IAM service account, conversations,
        tasks, access bindings, artifact versions, artifacts, ratings,
        agent metrics, shares, and retention policy. Cross-workspace
        storage cleanup runs best-effort.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: Agent deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResult'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/agents/discovery:
    get:
      tags: [Agents]
      operationId: discoverAgents
      summary: Get featured agents and categories
      description: |
        Discovery endpoint for the store homepage. Returns up to 10
        featured published agents (sorted by rating), and the list of
        distinct categories with counts.
      responses:
        '200':
          description: Featured agents + categories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryResponse'
        '400':
          description: Invalid arguments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/agents/import:
    post:
      tags: [Agents]
      operationId: importAgent
      summary: Import an agent from AGENTS.md
      description: |
        Parse an `AGENTS.md` document (YAML front matter + markdown
        instructions) and create a new agent from it. Provisions a
        service account; failure to provision rolls back the creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentImportInput'
            example:
              agents_md: |
                ---
                name: "_test_import_export_agent"
                description: "A test agent for import/export round-trip"
                model: "gpt-4o-mini"
                temperature: 0.7
                max_tokens: 2048
                ---

                You are a test assistant created via AGENTS.md import.
      responses:
        '200':
          description: Agent imported.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentImportResponse'
        '400':
          description: Validation error (missing or unparseable `agents_md`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed (only POST is accepted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Service account provisioning failed (agent record rolled back).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Governance service is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/agents/{agentId}/export:
    get:
      tags: [Agents]
      operationId: exportAgent
      summary: Export an agent as AGENTS.md
      description: |
        Returns the agent's portable AGENTS.md document (YAML front
        matter + markdown instructions). Response media type is
        `text/markdown`; the response is sent with
        `Content-Disposition: attachment; filename="agent-export.agents.md"`.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: AGENTS.md document.
          content:
            text/markdown:
              schema:
                type: string
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed (only GET is accepted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/agents/{agentId}/access:
    get:
      tags: [Access]
      operationId: listAgentBindings
      summary: List access bindings for an agent
      description: List user/group/org bindings on this agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
        - name: limit
          in: query
          required: false
          schema:
            type: string
          description: Page size (default 100).
        - name: page
          in: query
          required: false
          schema:
            type: string
          description: 1-indexed page number.
      responses:
        '200':
          description: List of bindings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessBindingListResponse'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Access]
      operationId: shareAgent
      summary: Share an agent with a principal (create binding)
      description: |
        Create a binding granting a user, group, or org access to this
        agent. User and group principals are validated against the
        agent's organization via `ai-governance-v2`. Default role is
        `admin` if `role_slug` is omitted.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessShareInput'
      responses:
        '200':
          description: Binding created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessShareResponse'
        '400':
          description: Validation error (invalid principal_type, missing principal_id, cross-org sharing, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Binding already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/agents/{agentId}/access/{principalType}/{principalId}:
    delete:
      tags: [Access]
      operationId: revokeAgentAccess
      summary: Revoke an agent access binding
      description: Delete the binding for the given (principal_type, principal_id) pair.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
        - name: principalType
          in: path
          required: true
          schema:
            type: string
            enum: [user, group, org]
            maxLength: 32
        - name: principalId
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
      responses:
        '200':
          description: Binding deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResult'
        '400':
          description: Invalid `principal_type`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No binding found for this principal.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '405':
          description: Method not allowed (only DELETE is accepted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/agents/{agentId}/access/request:
    post:
      tags: [Access]
      operationId: requestAgentAccess
      summary: Request access to a published restricted agent
      description: |
        Submit an access request for a published `restricted` agent.
        The agent owner / admins can approve or reject via
        `/v1/agents/{agentId}/access/requests/{requestId}`.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            maxLength: 64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRequestInput'
      responses:
        '201':
          description: Access request created (pending).
          content:
