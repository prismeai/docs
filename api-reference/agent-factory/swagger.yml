        updatedAt:
          type: string
          format: date-time
    AgentRestrictedView:
      type: object
      description: |
        Public-facing fields returned to callers without binding when the agent
        is `restricted`. Subset of the full Agent record.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        icon_url:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        visibility:
          type: string
          enum: [restricted]
        starters:
          type: array
          items:
            type: object
            additionalProperties: true
        status:
          type: string
        rating:
          type: number
        ratings_count:
          type: integer
        orgSlug:
          type: string
        published_at:
          type: string
          format: date-time
        owner_id:
          type: string
        messages_count:
          type: integer
        conversations_count:
          type: integer
    AgentCreateInput:
      type: object
      required: [instructions]
      properties:
        name:
          type: string
          maxLength: 256
        description:
          type: string
          maxLength: 4096
        instructions:
          type: string
          maxLength: 100000
          description: System prompt / agent instructions.
        model:
          type: string
          maxLength: 128
        fallback_models:
          type: array
          items:
            type: string
        temperature:
          type: number
        profile:
          type: string
          maxLength: 64
          enum: [simple, workflow, agent_light, agent_full, orchestrator]
        skills:
          type: array
          items:
            type: object
            additionalProperties: true
        sub_agents:
          type: array
          description: Sub-agent delegations (max 20).
          items:
            $ref: '#/components/schemas/SubAgentRef'
        starters:
          type: array
          description: Conversation starter prompts (max 10).
          items:
            type: object
            additionalProperties: true
    AgentUpdateInput:
      type: object
      description: Partial agent update payload. Any subset of the writable Agent fields.
      properties:
        name:
          type: string
          maxLength: 256
        description:
          type: string
          maxLength: 4096
        instructions:
          type: string
          maxLength: 100000
        model:
          type: string
          maxLength: 128
        fallback_models:
          type: array
          items:
            type: string
        temperature:
          type: number
        icon_url:
          type: string
        skills:
          type: array
          items:
            type: object
            additionalProperties: true
        guardrails:
          type: object
          additionalProperties: true
        sub_agents:
          type: array
          items:
            type: object
            additionalProperties: true
        tool_permissions:
          $ref: '#/components/schemas/ToolPermissions'
        tool_activation:
          $ref: '#/components/schemas/ToolActivation'
        allowed_models:
          type: array
          items:
            type: string
        max_tokens:
          type: integer
        max_turns:
          type: integer
        token_budget:
          type: integer
        tool_call_budget:
          type: integer
        canvas_enabled:
          type: boolean
        visibility:
          type: string
          enum: [public, private, restricted]
          maxLength: 32
        category:
          type: string
          maxLength: 128
        tags:
          type: array
          items:
            type: string
        starters:
          type: array
          items:
            type: object
            additionalProperties: true
        status:
          type: string
          enum: [draft, published]
          maxLength: 32
        profile:
          type: string
          enum: [simple, workflow, agent_light, agent_full, orchestrator]
          maxLength: 64
    AgentCreateResponse:
      type: object
      description: Slim record returned on agent create / import.
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [draft]
        serviceAccountId:
          type: string
        createdAt:
          type: string
          format: date-time
    AgentImportInput:
      type: object
      required: [agents_md]
      properties:
        agents_md:
          type: string
          maxLength: 200000
          description: Full AGENTS.md document (front matter + markdown).
    AgentImportResponse:
      allOf:
        - $ref: '#/components/schemas/AgentCreateResponse'
        - type: object
          properties:
            imported:
              type: boolean
              example: true
    AgentListResponse:
      type: object
      description: Page of agents (with `published_config` stripped on list rows).
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    DiscoveryCategory:
      type: object
      properties:
        value:
          type: string
        count:
          type: integer
    DiscoveryResponse:
      type: object
      description: Featured agents + categories for the discovery surface.
      properties:
        featured:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryCategory'
    # ----------------------------------------------------------------
    # Publishing
    # ----------------------------------------------------------------
    AgentPublishInput:
      type: object
      properties:
        visibility:
          type: string
          enum: [public, restricted]
          maxLength: 32
          description: Defaults to `public`.
        category:
          type: string
          maxLength: 128
        tags:
          type: array
          items:
            type: string
    AgentPublishResponse:
      type: object
      properties:
        status:
          type: string
          enum: [published]
        visibility:
          type: string
          enum: [public, restricted]
        published_at:
          type: string
          format: date-time
    AgentDiscardDraftResponse:
      type: object
      properties:
        discarded:
          type: boolean
          example: true
        agent_id:
          type: string
    # ----------------------------------------------------------------
    # Ratings
    # ----------------------------------------------------------------
    RatingInput:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
    RatingResult:
      type: object
      properties:
        rating:
          type: number
          description: New average rating (rounded to 1 decimal).
        ratings_count:
          type: integer
          description: Total number of ratings.
    # ----------------------------------------------------------------
    # Profiles
    # ----------------------------------------------------------------
    Profile:
      type: object
      description: Agent profile preset.
      properties:
        id:
          type: string
          enum: [simple, workflow, agent_light, agent_full, orchestrator]
        description:
          type: string
        level:
          type: string
        features:
          type: object
          additionalProperties: true
        limits:
          type: object
          additionalProperties: true
        use_cases:
          type: array
          items:
            type: string
    ProfileListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Profile'
    # ----------------------------------------------------------------
    # Tools
    # ----------------------------------------------------------------
    Tool:
      type: object
      description: |
        Tool entry attached to an agent. Discriminated by `type` -
        `file_search` (requires `vector_store_id`), `mcp` (uses `server`,
        `headers`, `scope`), or `function` (uses `url`, `parameters`,
        `headers`).
      additionalProperties: true
      properties:
        id:
          type: string
        type:
          type: string
          enum: [file_search, mcp, function]
        name:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        display_name:
          type: string
        description:
          type: string
        catalog_id:
          type: string
        auth:
          type: object
          additionalProperties: true
        icon_url:
          type: string
        vector_store_id:
          type: string
          description: Required for `file_search`.
        server:
          type: string
          description: MCP server URL (for `mcp`).
        headers:
          type: object
          additionalProperties: true
        scope:
          type: string
        url:
          type: string
          description: Required for `function`.
        parameters:
          type: object
          additionalProperties: true
          description: JSON Schema describing the function tool's parameters.
    ToolAddInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [file_search, mcp, function]
          maxLength: 64
        name:
          type: string
          maxLength: 128
          pattern: '^[a-zA-Z0-9_-]+$'
        display_name:
          type: string
          maxLength: 256
        description:
          type: string
          maxLength: 4096
        catalog_id:
          type: string
          maxLength: 128
        auth:
          type: object
          additionalProperties: true
        icon_url:
          type: string
          maxLength: 2048
        vector_store_id:
          type: string
          maxLength: 128
          description: Required for `file_search`.
        server:
          type: string
          maxLength: 2048
          description: MCP server URL (for `mcp`).
        headers:
          type: object
          additionalProperties: true
        scope:
          type: string
          maxLength: 256
        url:
          type: string
          maxLength: 2048
          description: Required for `function`.
        parameters:
          type: object
          additionalProperties: true
          description: JSON Schema describing the function tool's parameters.
    ToolListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tool'
    # ----------------------------------------------------------------
    # Conversations
    # ----------------------------------------------------------------
    Conversation:
      type: object
      description: Conversation envelope (one row per A2A `contextId`).
      properties:
        contextId:
          type: string
        agent_id:
          type: string
        title:
          type: string
        is_archived:
          type: boolean
        is_starred:
          type: boolean
        messages_count:
          type: integer
        last_message_at:
          type: string
        createdAt:
          type: string
          format: date-time
    ConversationCreateInput:
      type: object
      properties:
        title:
          type: string
          maxLength: 512
          description: Optional title (default `New conversation`).
    ConversationUpdateInput:
      type: object
      properties:
        title:
          type: string
          maxLength: 512
        is_archived:
          type: boolean
        is_starred:
          type: boolean
    ConversationListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
    ConversationDetailResponse:
      type: object
      properties:
        conversation:
          $ref: '#/components/schemas/Conversation'
        messages:
          type: array
          description: Task-message records (A2A history entries).
          items:
            type: object
            additionalProperties: true
    ConversationsBulkDeleteResult:
      type: object
      properties:
        deleted:
          type: boolean
          example: true
        count:
          type: integer
          description: Number of conversations deleted.
    # ----------------------------------------------------------------
    # Messages / A2A
    # ----------------------------------------------------------------
    MessagePart:
      type: object
      description: |
        A2A message part. Discriminated by field presence:
        `TextPart` (`text`), `FilePart` (`url`/`raw`, `mediaType`,
        `filename`), `DataPart` (`data`, `mediaType`).
      additionalProperties: true
    Message:
      type: object
      description: A2A v0.3 flat message envelope.
      properties:
        message_id:
          type: string
          maxLength: 256
        role:
          type: string
          enum: [user, agent]
        contextId:
          type: string
          maxLength: 64
        taskId:
          type: string
        parts:
          type: array
          items:
            $ref: '#/components/schemas/MessagePart'
    MessageSendInput:
      type: object
      required: [message]
      properties:
        message:
          $ref: '#/components/schemas/Message'
    ToolCallSummary:
      type: object
      properties:
        name:
          type: string
        arguments:
          type: object
          additionalProperties: true
        status:
          type: string
    MessageSendResponse:
      type: object
      properties:
        error:
          type: object
          nullable: true
          additionalProperties: true
        task:
          type: object
          properties:
            id:
              type: string
            contextId:
              type: string
            status:
              $ref: '#/components/schemas/TaskStatus'
            output:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    $ref: '#/components/schemas/Message'
            usage:
              type: object
              additionalProperties: true
            tool_calls:
              type: array
              items:
                $ref: '#/components/schemas/ToolCallSummary'
    # ----------------------------------------------------------------
    # Tasks
    # ----------------------------------------------------------------
    TaskState:
      type: string
      description: A2A task state.
      enum: [working, completed, canceled, failed, input-required]
    TaskStatus:
      type: object
      properties:
        state:
          $ref: '#/components/schemas/TaskState'
        timestamp:
          type: string
        message:
          type: object
          additionalProperties: true
    Task:
      type: object
      description: A2A task record.
      properties:
        id:
          type: string
        contextId:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        history:
          type: array
          items:
            type: object
            additionalProperties: true
        artifacts:
          type: array
          items:
            type: object
            additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    TaskListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'
    TaskCancelResult:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          example: canceled
    TaskResolveInput:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean
          description: Approve or reject the pending tool call.
        reason:
          type: string
          maxLength: 2048
          description: Optional rationale, surfaced in audit trail.
    TaskResolveResponse:
      type: object
      properties:
        task_id:
          type: string
        status:
          type: object
          additionalProperties: true
        resolution:
          type: string
          enum: [approved, rejected]
        resolved_by:
          type: string
    TaskSnapshot:
      allOf:
        - $ref: '#/components/schemas/Task'
        - type: object
          properties:
            terminal:
              type: boolean
              description: True when state is `completed`, `canceled`, or `failed`.
    # ----------------------------------------------------------------
    # Artifacts
    # ----------------------------------------------------------------
    ArtifactDetail:
      type: object
      description: Artifact record with the resolved current-version content.
      properties:
        id:
          type: string
        title:
          type: string
        artifact_type:
          type: string
        mime_type:
          type: string
        language:
          type: string
        filename:
          type: string
        current_version:
          type: integer
        total_versions:
          type: integer
        content:
          type: string
        conversation_id:
          type: string
        agent_id:
          type: string
        user_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ArtifactListResponse:
      type: object
      description: Paginated list of artifacts (no `total` returned by this endpoint).
      properties:
        artifacts:
          type: array
          items:
            type: object
            additionalProperties: true
            description: Artifact record (see `ArtifactDetail`).
        page:
          type: integer
        limit:
          type: integer
    ArtifactPatchInput:
      type: object
      description: |
        Two mutation modes - exactly one of `content` (full replace,
        creates a new version) or `patches` (line-level operations,
        applied atomically) MUST be present.
      properties:
        content:
          type: string
          description: Full replacement content (creates a new version).
        patches:
          type: array
          description: Line-level operations applied atomically.
          items:
            type: object
            additionalProperties: true
        change_summary:
          type: string
          maxLength: 512
        base_version:
          type: integer
          description: Expected current version for optimistic concurrency.
    ArtifactDeleteResult:
      type: object
      properties:
        deleted:
          type: boolean
          example: true
        artifact_id:
          type: string
    # ----------------------------------------------------------------
    # Shares
    # ----------------------------------------------------------------
    ConversationShareInput:
      type: object
      properties:
        message_id:
          type: string
          maxLength: 128
          description: |
            Optional - when set, share is scoped to this single message
            (`type: "message"` instead of `"conversation"`).
    ConversationShareResponse:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [conversation, message]
        url:
          type: string
          description: UI URL on the caller's origin (`/share/{share_id}`).
        apiUrl:
          type: string
          description: Public API URL pointing at `/v1/shared/{shareId}`.
        created_at:
          type: string
          format: date-time
    ArtifactShareInput:
      type: object
      properties:
        access_level:
          type: string
          enum: [view]
          maxLength: 32
          description: Default `view`.
    ArtifactShareResponse:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [artifact]
        artifact_id:
          type: string
        url:
          type: string
        apiUrl:
          type: string
        access_level:
          type: string
    ShareListItem:
      type: object
      description: Share row as returned by the owner's list endpoint.
      properties:
        id:
          type: string
        type:
          type: string
          enum: [conversation, message, artifact]
        context_id:
          type: string
        message_id:
          type: string
        artifact_id:
          type: string
        agent_id:
          type: string
        title:
          type: string
        agent_name:
          type: string
        artifact_type:
          type: string
        url:
          type: string
          description: Workspace-relative public viewer URL.
        created_at:
          type: string
          format: date-time
    ShareListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ShareListItem'
    Share:
      type: object
      description: Share record (owner view).
      properties:
        id:
          type: string
        type:
          type: string
          enum: [conversation, message, artifact]
        context_id:
          type: string
        message_id:
          type: string
        agent_id:
          type: string
        url:
          type: string
        created_at:
          type: string
          format: date-time
        snapshot:
          type: object
          additionalProperties: true
          description: |
            The frozen snapshot - for `conversation`/`message` shares this
            includes `messages`, `artifacts`, `agent_name`, `agent_icon_url`.
            For `artifact` shares it carries `content`, `artifact_type`,
            `mime_type`, `version`, `access_level`.
    ShareView:
      type: object
      description: Public-facing view returned by `/v1/shared/{shareId}`.
      properties:
        id:
          type: string
        type:
          type: string
          enum: [conversation, message, artifact]
        created_at:
          type: string
          format: date-time
        snapshot:
          type: object
          additionalProperties: true
        is_mine:
          type: boolean
    # ----------------------------------------------------------------
    # Access bindings & requests
    # ----------------------------------------------------------------
    AccessBinding:
      type: object
      description: Access binding granting a principal a role on an agent.
      properties:
        agent_id:
          type: string
        principal_type:
          type: string
          enum: [user, group, org]
        principal_id:
          type: string
        email:
          type: string
        orgSlug:
          type: string
        granted_by:
          type: string
        role_slug:
          type: string
    AccessBindingListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccessBinding'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    AccessShareInput:
      type: object
      required: [principal_type, principal_id]
      properties:
        principal_type:
          type: string
          enum: [user, group, org]
          maxLength: 32
        principal_id:
          type: string
          maxLength: 128
          description: User id (or email for user type, resolved server-side), group id, or org slug.
        role_slug:
          type: string
          maxLength: 64
          description: Role to grant. Defaults to `admin`.
    AccessShareResponse:
      type: object
      properties:
        created:
          type: boolean
          example: true
        binding:
          $ref: '#/components/schemas/AccessBinding'
    AccessRequest:
      type: object
      description: Pending or resolved access request for a restricted agent.
      additionalProperties: true
      properties:
        _id:
          type: string
        agent_id:
          type: string
        requester_id:
          type: string
        requester_email:
          type: string
        orgSlug:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        message:
          type: string
        resolved_by:
          type: string
        rejection_reason:
          type: string
    AccessRequestInput:
      type: object
      properties:
        message:
          type: string
          maxLength: 1024
          description: Optional rationale for the access request.
    AccessRequestListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccessRequest'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    AccessRequestResolveInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [approve, reject]
          maxLength: 16
        rejection_reason:
          type: string
          maxLength: 1024
    AccessRequestResolveResponse:
      type: object
      properties:
        _id:
          type: string
        agent_id:
          type: string
        requester_id:
          type: string
        requester_email:
          type: string
        status:
          type: string
          enum: [approved, rejected]
        resolved_by:
          type: string
        rejection_reason:
          type: string
    # ----------------------------------------------------------------
    # API keys
    # ----------------------------------------------------------------
    AgentApiKeyCreateInput:
      type: object
      required: [name, slug, permissions]
      properties:
        name:
          type: string
          maxLength: 128
        slug:
          type: string
          maxLength: 96
        permissions:
          type: array
          minItems: 1
          items:
            type: string
            maxLength: 96
          description: Permissions (will be prefixed with `agent-factory:` server-side).
        expiresAt:
          type: string
          description: ISO timestamp.
    AgentApiKeyRotateInput:
      type: object
      properties:
        expiresAt:
          type: string
          description: New expiration ISO timestamp (optional).
    # ----------------------------------------------------------------
    # Activity feed
    # ----------------------------------------------------------------
    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        group:
          type: string
        timestamp:
          type: string
          format: date-time
        correlationId:
          type: string
        userId:
          type: string
        agent_id:
          type: string
        data:
          type: object
          additionalProperties: true
          description: Sanitized event payload (sensitive fields stripped).
    ActivityListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ActivityItem'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
    # ----------------------------------------------------------------
    # Analytics
    # ----------------------------------------------------------------
    AnalyticsPeriod:
      type: object
      properties:
        type:
          type: string
        start:
          type: string
        end:
          type: string
        granularity:
          type: string
    AnalyticsSeriesPoint:
      type: object
      properties:
        date:
          type: string
        users:
          type: integer
        conversations:
          type: integer
        messages:
          type: integer
        rating:
          type: number
        cost:
          type: number
        status:
          type: string
          enum: [incomplete, complete]
    AnalyticsMeta:
      type: object
      properties:
        generated_at:
          type: string
        data_points:
          type: integer
        includes_current_interval:
          type: boolean
        summary_cached:
          type: boolean
        data_computed_at:
          type: string
        next_refresh_at:
          type: string
    AgentAnalytics:
      type: object
      description: Analytics payload (series + summary) for a single agent.
      properties:
        agent_id:
          type: string
        agent_name:
          type: string
        period:
          $ref: '#/components/schemas/AnalyticsPeriod'
        summary:
          type: object
          additionalProperties: true
          description: Aggregated KPIs (users, engagement, quality, performance, cost, models, tools).
        series:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsSeriesPoint'
        meta:
          $ref: '#/components/schemas/AnalyticsMeta'
    RefreshMetricsInput:
      type: object
      properties:
        period_start:
          type: string
          description: ISO timestamp - start of the refresh window.
        period_end:
          type: string
          description: ISO timestamp - end of the refresh window (exclusive).
        granularity:
          type: string
          enum: [5m, hourly, daily]
          description: Aggregation granularity. Default `hourly`.
    RefreshMetricsResult:
      type: object
      properties:
        status:
          type: string
          example: refreshed
        agent_id:
          type: string
        granularity:
          type: string
          enum: [5m, hourly, daily]
        period_start:
          type: string
        period_end:
          type: string
        entries_written:
          type: integer
        error:
          type: string
          description: Set if a partial failure occurred during aggregation.
    # ----------------------------------------------------------------
    # Retention
    # ----------------------------------------------------------------
    RetentionEffective:
      type: object
      description: Resolved retention values (agent → org → platform defaults).
      properties:
        conversations_retention_days:
          type: integer
          nullable: true
        documents_retention_days:
          type: integer
          nullable: true
        tasks_retention_days:
          type: integer
          nullable: true
        artifacts_retention_days:
          type: integer
          nullable: true
    AgentRetentionInput:
      type: object
      properties:
        conversations_retention_days:
          type: integer
          nullable: true
        documents_retention_days:
          type: integer
          nullable: true
        tasks_retention_days:
          type: integer
          nullable: true
        artifacts_retention_days:
          type: integer
          nullable: true
        admin_override:
          type: boolean
          description: Admins only - opt out of org-limit enforcement.
    OrgRetentionInput:
      type: object
      properties:
        conversations_retention_days:
          type: integer
          nullable: true
        documents_retention_days:
          type: integer
          nullable: true
        tasks_retention_days:
          type: integer
          nullable: true
        artifacts_retention_days:
          type: integer
          nullable: true
    AgentRetentionResponse:
      type: object
      properties:
        policy:
          type: object
          nullable: true
          additionalProperties: true
          description: |
            Raw `retention_policies` document for this agent
            (`scope: "agent"`). Null when no override is set.
        effective:
          $ref: '#/components/schemas/RetentionEffective'
    OrgRetentionResponse:
      type: object
      properties:
        policy:
          type: object
          nullable: true
          additionalProperties: true
        effective:
          $ref: '#/components/schemas/RetentionEffective'
    RetentionDeleteResult:
      type: object
      properties:
        deleted:
          type: boolean
    # ----------------------------------------------------------------
    # Evaluations
    # ----------------------------------------------------------------
    EvaluationRunInput:
      type: object
      required: [file_id]
      properties:
        file_id:
          type: string
          maxLength: 128
          description: Storage `file_id` containing the evaluation inputs.
        name:
          type: string
          maxLength: 256
        criteria:
          type: string
          maxLength: 4096
          description: Free-text grading criteria.
        judge_model:
          type: string
          maxLength: 128
          description: LLM-as-judge model. Default `gpt-4o`.
    EvaluationRunResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          example: running
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    # ----------------------------------------------------------------
    # A2A - JSON-RPC envelopes & cards
    # ----------------------------------------------------------------
    JsonRpcError:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          additionalProperties: true
    JsonRpcResponse:
      type: object
      description: A2A JSON-RPC 2.0 response.
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
        id:
          type: string
          nullable: true
          description: Echoes the request id (string or null per JSON-RPC 2.0).
        result:
          type: object
          additionalProperties: true
        error:
          $ref: '#/components/schemas/JsonRpcError'
    JsonRpcErrorEnvelope:
      type: object
      description: |
        Bare JSON-RPC error envelope returned without a successful `result`
        (e.g. when the legacy gateway cannot resolve the target agent).
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
        error:
          type: object
          properties:
            code:
              type: integer
              example: -32000
            message:
              type: string
        id:
          type: string
          nullable: true
          description: Echoes the request id (string or null per JSON-RPC 2.0).
    JsonRpcRequest:
      type: object
      description: Per-agent A2A JSON-RPC 2.0 request.
      required: [jsonrpc, method]
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
        method:
          type: string
          maxLength: 64
        params:
          type: object
          additionalProperties: true
        id:
          type: string
          maxLength: 128
    LegacyJsonRpcRequest:
      type: object
      description: |
        Legacy `/v1/a2a` JSON-RPC request. `params.id` MUST be present -
        it identifies the target agent for gateway dispatch.
      required: [jsonrpc, method, params]
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
        method:
          type: string
          maxLength: 64
          description: A2A method name (e.g. `message/send`, `tasks/get`).
        params:
          type: object
          required: [id]
          properties:
            id:
              type: string
              maxLength: 128
              description: Target agent ID - required by the legacy gateway.
          additionalProperties: true
        id:
          type: string
          maxLength: 128
          description: JSON-RPC request id - echoed back in the response.
    AgentCardInterface:
      type: object
      properties:
        url:
          type: string
        protocolBinding:
          type: string
    AgentCardCapabilities:
      type: object
      properties:
        streaming:
          type: boolean
        pushNotifications:
          type: boolean
        stateTransitionHistory:
          type: boolean
    AgentCard:
      type: object
      description: A2A 0.3 discovery card.
      additionalProperties: true
      properties:
        protocolVersions:
          type: array
          items:
            type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        supportedInterfaces:
          type: array
          items:
            $ref: '#/components/schemas/AgentCardInterface'
        capabilities:
          $ref: '#/components/schemas/AgentCardCapabilities'
        securitySchemes:
          type: object
          additionalProperties: true
        security:
          type: array
          items:
            type: object
            additionalProperties: true
        defaultInputModes:
          type: array
          items:
            type: string
        defaultOutputModes:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: object
            additionalProperties: true
        iconUrl:
          type: string
    ExtendedAgentCard:
      type: object
      description: |
        Extended A2A AgentCard. Public AgentCard fields + `tools`,
        `guardrails`, `sub_agents`, `model`, `temperature`.
      additionalProperties: true
