        allowed_models:
          type: array
          items:
            type: string
        max_tokens:
          type: integer
        max_turns:
          type: integer
        token_budget:
          type: integer
        tool_call_budget:
          type: integer
        canvas_enabled:
          type: boolean
        visibility:
          type: string
          enum: [public, private, restricted]
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, published]
        profile:
          type: string
          enum: [simple, workflow, agent_light, agent_full, orchestrator]
        owner_id:
          type: string
        orgSlug:
          type: string
        subscription_id:
          type: string
        serviceAccountId:
          type: string
        published_config:
